          }
          const attempt = await hashPassword(pwInput);
          if (attempt !== target.passwordHash) { setPwError('Wrong password'); return; }
          if (isSwitch) {
            setPlayerName(passwordModal.profileName);
            localStorage.setItem('playerName', passwordModal.profileName);
            setLibraryTab('mine');
          } else {
            setAllProfiles(prev => {
              const next = { ...prev };
              delete next[passwordModal.profileName];
              localStorage.setItem('profiles', JSON.stringify(next));
              return next;
            });
            if (playerName === passwordModal.profileName) {
              setPlayerName('');
              localStorage.removeItem('playerName');
              setLibraryTab('all');
            }
          }
          closePwModal();
        };
        return (
          <div style={{
            position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
            background: "rgba(0,0,0,0.6)", zIndex: 2100,
            display: "flex", alignItems: "center", justifyContent: "center", padding: 20,
          }} onClick={closePwModal}>
            <div style={{
              background: "var(--bg)", borderRadius: 16, border: "1px solid var(--border)",
              maxWidth: 320, padding: 24, textAlign: "center",
            }} onClick={e => e.stopPropagation()}>
              <div style={{ fontSize: 36, marginBottom: 12 }}>🔒</div>
              <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 12, fontFamily: "inherit" }}>{title}</div>
              <input type="password" value={pwInput}
                onChange={e => { setPwInput(e.target.value); setPwError(''); }}
                onKeyDown={e => { if (e.key === "Enter") submit(); e.stopPropagation(); }}
                autoFocus
                placeholder={isSet ? "Password (min 4)" : "Password"}
                style={{
                  width: "100%", padding: "10px 14px", fontSize: 16, textAlign: "center",
                  background: "var(--bg2)",
                  border: `1px solid ${pwError ? "var(--danger)" : "var(--border)"}`,
                  borderRadius: 8, color: "var(--text)", fontFamily: "inherit", outline: "none",
                  marginBottom: 8, boxSizing: "border-box",
                }}
              />
              {isSet && (<>
                <input type="password" value={pwConfirm}
                  onChange={e => setPwConfirm(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter") submit(); e.stopPropagation(); }}
                  placeholder="Confirm password"
                  style={{
                    width: "100%", padding: "10px 14px", fontSize: 16, textAlign: "center",
                    background: "var(--bg2)",
                    border: `1px solid ${pwConfirm && pwInput !== pwConfirm ? "var(--danger)" : "var(--border)"}`,
                    borderRadius: 8, color: "var(--text)", fontFamily: "inherit", outline: "none",
                    marginBottom: 8, boxSizing: "border-box",
                  }}
                />
                <input type="text" value={pwHint}
                  onChange={e => setPwHint(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter") submit(); e.stopPropagation(); }}
                  placeholder="Password hint"
                  style={{
                    width: "100%", padding: "10px 14px", fontSize: 15, textAlign: "center",
                    background: "var(--bg2)", border: "1px solid var(--border)", borderRadius: 8,
                    color: "var(--text)", fontFamily: "inherit", outline: "none",
                    marginBottom: 8, boxSizing: "border-box",
                  }}
                />
              </>)}
              {pwError && <div style={{ color: "var(--danger)", fontSize: 13, marginBottom: 8 }}>{pwError}</div>}
              {!isSet && target.hint && (
                <div style={{ marginBottom: 12 }}>
                  <button onClick={() => setPwShowHint(s => !s)} style={{
                    background: "transparent", border: "none", color: "var(--accent)",
                    fontSize: 13, cursor: "pointer", fontFamily: "inherit", textDecoration: "underline",
                  }}>{pwShowHint ? "Hide hint" : "Show hint"}</button>
                  {pwShowHint && <div style={{ fontSize: 13, color: "var(--text2)", marginTop: 6 }}>Hint: {target.hint}</div>}
                </div>
              )}
              <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 4 }}>
                <button onClick={closePwModal} style={{
                  padding: "10px 16px", background: "var(--bg3)", border: "1px solid var(--border)",
                  borderRadius: 8, color: "var(--text)", fontSize: 14,
                  fontFamily: "inherit", cursor: "pointer",
                }}>Cancel</button>
                <button onClick={submit} disabled={!canSubmit} style={{
                  padding: "10px 20px", background: canSubmit ? "var(--accent)" : "var(--bg3)",
                  border: "none", borderRadius: 8, color: "#fff", fontSize: 14, fontWeight: 600,
                  fontFamily: "inherit", cursor: canSubmit ? "pointer" : "not-allowed",
                  opacity: canSubmit ? 1 : 0.5,
                }}>OK</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* End-of-practice celebration */}
      {celebrateMsg && (
        <div style={{
          position: "fixed", inset: 0, zIndex: 2500,
          display: "flex", alignItems: "center", justifyContent: "center",
          pointerEvents: "none",
        }}>
          <div style={{
            fontSize: "clamp(56px, 12vw, 140px)",
            fontWeight: 900,
            fontFamily: "'Comic Neue', cursive",
            color: "#fff",
            textShadow:
              "0 0 20px rgba(255,255,255,0.8), 4px 4px 0 #dc2626, -4px -4px 0 #3b82f6, 4px -4px 0 #22c55e, -4px 4px 0 #a855f7, 6px 6px 30px rgba(0,0,0,0.35)",
            animation: "celebratePop 0.5s ease-out",
          }}>
            {celebrateMsg}
          </div>
          <style>{`
            @keyframes celebratePop {
              0%   { transform: scale(0.2) rotate(-10deg); opacity: 0; }
              60%  { transform: scale(1.15) rotate(3deg); opacity: 1; }
              100% { transform: scale(1) rotate(0deg); opacity: 1; }
            }
          `}</style>
        </div>
      )}

      {/* PIN Prompt */}
      {showPinPrompt && (
        <div style={{
          position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
          background: "rgba(0,0,0,0.6)", zIndex: 2000,
          display: "flex", alignItems: "center", justifyContent: "center",
          padding: 20,
        }} onClick={() => setShowPinPrompt(false)}>
          <div style={{
            background: "var(--bg)", borderRadius: 16, border: "1px solid var(--border)",
            maxWidth: 300, padding: 24, textAlign: "center",
          }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize: 36, marginBottom: 12 }}>🔐</div>
            <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 16 }}>Login to edit</div>
            {pinError && <div style={{ color: "var(--danger)", fontSize: 13, marginBottom: 8 }}>{pinError}</div>}
            <input type="password" value={pinInput}
              onChange={e => { setPinInput(e.target.value); setPinError(""); }}
              onKeyDown={e => { if (e.key === "Enter") handlePinSubmit(); e.stopPropagation(); }}
              autoFocus
              placeholder="Password"
              style={{
                width: "100%", padding: "10px 14px", fontSize: 18, textAlign: "center",
                background: "var(--bg2)", border: "1px solid var(--border)", borderRadius: 8,
                color: "var(--text)", fontFamily: "inherit", outline: "none",
                letterSpacing: 4, marginBottom: 16,
              }}
            />
            <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
              <button onClick={() => setShowPinPrompt(false)} style={{
                padding: "10px 16px", background: "var(--bg3)", border: "1px solid var(--border)",
                borderRadius: 8, color: "var(--text)", fontSize: 14,
                fontFamily: "inherit", cursor: "pointer",
              }}>Cancel</button>
              <button onClick={handlePinSubmit} style={{
                padding: "10px 20px", background: "var(--accent)", border: "none",
                borderRadius: 8, color: "#fff", fontSize: 14, fontWeight: 600,
                fontFamily: "inherit", cursor: "pointer",
              }}>Login</button>
            </div>
          </div>
        </div>
      )}

      {/* Library iframe overlay — keeps fullscreen alive by not navigating. */}
      <LibraryOverlay
        open={libraryOpen}
        isAdmin={!childLock}
        onClose={() => setLibraryOpen(false)}
        onOpenSong={(title) => {
          const song = (library || []).find(s => (s.title || '').trim() === title);
          if (song) { loadFromLibrary(song); setLibraryOpen(false); return; }
          (async () => {
            try {
              const ep = childLock ? '/api/published' : '/api/songs';
              const r = await fetch(ep, { credentials: 'include' });
              const songs = await r.json();
              const match = (Array.isArray(songs) ? songs : []).find(s => (s.title || '').trim() === title);
              if (match) loadFromLibrary(match);
            } catch {}
            setLibraryOpen(false);
          })();
        }}
      />

      {/* Add to Home Screen Hint */}
      {showHomeScreenHint && (
        <div style={{
          position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
          background: "rgba(0,0,0,0.6)", zIndex: 2000,
          display: "flex", alignItems: "center", justifyContent: "center",
          padding: 20,
        }} onClick={() => setShowHomeScreenHint(false)}>
          <div style={{
            background: "var(--bg)", borderRadius: 16, border: "1px solid var(--border)",
            maxWidth: 360, padding: 24, textAlign: "center",
          }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize: 48, marginBottom: 12 }}>📱</div>
            <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 12 }}>Full Screen Mode</div>
            <div style={{ fontSize: 14, color: "var(--text2)", marginBottom: 16, lineHeight: 1.5 }}>
              For full screen mode, tap the <strong>Share</strong> button in your browser, then tap <strong>Add to Home Screen</strong>. Launch the app from the home screen icon to see it in full screen.
            </div>
            <button onClick={() => setShowHomeScreenHint(false)} style={{
              padding: "10px 20px", background: "var(--accent)", border: "none",
              borderRadius: 8, color: "#fff", fontSize: 14, fontWeight: 600,
              fontFamily: "inherit", cursor: "pointer",
            }}>Got it</button>
          </div>
        </div>
      )}

      {/* Save As Dialog */}
      {showSaveAs && (
        <div style={{
          position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
          background: "rgba(0,0,0,0.5)", zIndex: 1200,
          display: "flex", alignItems: "center", justifyContent: "center",
          padding: 20,
        }} onClick={() => setShowSaveAs(false)}>
          <div style={{
            background: "var(--bg)", borderRadius: 16, border: "1px solid var(--border)",
            width: "100%", maxWidth: 400, padding: 24,
            boxShadow: "0 20px 60px rgba(0,0,0,0.2)",
          }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 16 }}>Save As</div>
            <div style={{ fontSize: 13, color: "var(--text2)", marginBottom: 8 }}>Enter a name for your score:</div>
            <input
              value={saveAsName}
              onChange={e => setSaveAsName(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && confirmSaveAs()}
              autoFocus
              style={{
                width: "100%", padding: "10px 14px", background: "var(--bg2)",
                border: "1px solid var(--border)", borderRadius: 8,
                color: "var(--text)", fontSize: 15, fontFamily: "inherit", outline: "none",
                marginBottom: 16,
              }}
            />
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
              <button onClick={() => setShowSaveAs(false)} style={{
                padding: "10px 16px", background: "var(--bg3)", border: "1px solid var(--border)",
                borderRadius: 8, color: "var(--text)", fontSize: 14,
                fontFamily: "inherit", cursor: "pointer",
              }}>Cancel</button>
              <button onClick={confirmSaveAs} style={{
                padding: "10px 20px", background: "var(--accent)", border: "none",
                borderRadius: 8, color: "#fff", fontSize: 14, fontWeight: 600,
                fontFamily: "inherit", cursor: "pointer",
              }}>Save</button>
            </div>
          </div>
        </div>
      )}

      {/* Folder Browser Modal */}
      {showFolderBrowser && (
        <div style={{
          position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
          background: "rgba(0,0,0,0.5)", zIndex: 1100,
          display: "flex", alignItems: "center", justifyContent: "center",
          padding: 20,
        }} onClick={() => setShowFolderBrowser(false)}>
          <div style={{
            background: "var(--bg)", borderRadius: 16, border: "1px solid var(--border)",
            width: "100%", maxWidth: 500, maxHeight: "70vh",
            display: "flex", flexDirection: "column",
            boxShadow: "0 20px 60px rgba(0,0,0,0.2)",
            overflow: "hidden",
          }} onClick={e => e.stopPropagation()}>
            <div style={{
              padding: "16px 20px", borderBottom: "1px solid var(--border)",
              display: "flex", alignItems: "center", justifyContent: "space-between",
            }}>
              <div style={{ fontSize: 16, fontWeight: 700 }}>📁 Choose Save Folder</div>
              <button onClick={() => setShowFolderBrowser(false)} style={{
                background: "var(--bg3)", border: "1px solid var(--border)",
                borderRadius: 6, padding: "4px 10px", color: "var(--text)",
                fontSize: 13, fontFamily: "inherit", cursor: "pointer",
              }}>Cancel</button>
            </div>

            <div style={{
              padding: "10px 20px", borderBottom: "1px solid var(--border)",
              background: "var(--bg2)", fontSize: 12, color: "var(--text2)",
              fontFamily: "monospace", wordBreak: "break-all",
            }}>
              {browsePath}
            </div>

            <div style={{ flex: 1, overflowY: "auto", padding: "8px 12px" }}>
              {browseParent && browseParent !== browsePath && (
                <div
                  onClick={() => navigateTo(browseParent)}
                  style={{
                    padding: "10px 12px", marginBottom: 4, borderRadius: 8,
                    cursor: "pointer", display: "flex", alignItems: "center", gap: 8,
                    fontSize: 14, color: "var(--accent)", fontWeight: 600,
                  }}
                  onMouseOver={e => e.currentTarget.style.background = "var(--bg2)"}
                  onMouseOut={e => e.currentTarget.style.background = "transparent"}
                >
                  ⬆️ Parent folder
                </div>
              )}
              {browseEntries.map(entry => (
                <div
                  key={entry.path}
                  onClick={() => navigateTo(entry.path)}
                  style={{
                    padding: "10px 12px", marginBottom: 2, borderRadius: 8,
                    cursor: "pointer", display: "flex", alignItems: "center", gap: 8,
                    fontSize: 14, color: "var(--text)",
                  }}
                  onMouseOver={e => e.currentTarget.style.background = "var(--bg2)"}
                  onMouseOut={e => e.currentTarget.style.background = "transparent"}
                >
                  📁 {entry.name}
                </div>
              ))}
              {browseEntries.length === 0 && (
                <div style={{ padding: 20, textAlign: "center", color: "var(--text2)", fontSize: 13 }}>
                  No subfolders here
                </div>
              )}
            </div>

            {showNewFolder && (
              <div style={{
                padding: "10px 20px", borderTop: "1px solid var(--border)",
                display: "flex", gap: 8, alignItems: "center",
              }}>
                <input
                  value={newFolderName}
                  onChange={e => setNewFolderName(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && createFolder()}
                  placeholder="Folder name..."
                  autoFocus
                  style={{
                    flex: 1, padding: "8px 12px", background: "var(--bg2)",
                    border: "1px solid var(--border)", borderRadius: 6,
                    color: "var(--text)", fontSize: 13, fontFamily: "inherit", outline: "none",
                  }}
                />
                <button onClick={createFolder} style={{
                  padding: "8px 14px", background: "var(--green)", border: "none",
                  borderRadius: 6, color: "#fff", fontSize: 13, fontWeight: 600,
                  fontFamily: "inherit", cursor: "pointer",
                }}>Create</button>
                <button onClick={() => { setShowNewFolder(false); setNewFolderName(""); }} style={{
                  padding: "8px 10px", background: "var(--bg3)", border: "1px solid var(--border)",
                  borderRadius: 6, color: "var(--text)", fontSize: 13,
                  fontFamily: "inherit", cursor: "pointer",
                }}>Cancel</button>
              </div>
            )}

            <div style={{
              padding: "12px 20px", borderTop: "1px solid var(--border)",
              display: "flex", justifyContent: "space-between", gap: 8,
            }}>
              <button onClick={() => setShowNewFolder(true)} style={{
                padding: "10px 16px", background: "var(--bg3)", border: "1px solid var(--border)",
                borderRadius: 8, color: "var(--text)", fontSize: 14,
                fontFamily: "inherit", cursor: "pointer",
              }}>+ New Folder</button>
              <button onClick={selectFolder} style={{
                padding: "10px 20px", background: "var(--accent)", border: "none",
                borderRadius: 8, color: "#fff", fontSize: 14, fontWeight: 600,
                fontFamily: "inherit", cursor: "pointer",
              }}>Select This Folder</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(MusicNotationEditor));
  </script>
</body>
</html>
