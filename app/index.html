  <script>
    // Server-side storage API
    window.noteforgeAPI = {
      async listSongs() {
        try {
          const res = await fetch('/api/songs');
          return await res.json();
        } catch (e) { console.error('List failed:', e); return []; }
      },
      async saveSong(song, oldTitle, opts) {
        try {
          const res = await fetch('/api/songs', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ song, oldTitle, loadedFrom: opts && opts.loadedFrom, allowOverwrite: !!(opts && opts.allowOverwrite) }),
          });
          if (res.status === 409) {
            const data = await res.json().catch(() => ({}));
            console.warn('Save blocked — would overwrite different song:', data.existingTitle);
            return { blocked: true, existingTitle: data.existingTitle };
          }
          return res.ok;
        } catch (e) { console.error('Save failed:', e); return false; }
      },
      async deleteSong(filename) {
        try {
          const res = await fetch('/api/songs/' + encodeURIComponent(filename), { method: 'DELETE', credentials: 'include' });
          return res.ok;
        } catch (e) { return false; }
      },
      async getState() {
        try {
          const res = await fetch('/api/state');
          return await res.json();
        } catch (e) { return {}; }
      },
      async saveState(state) {
        try {
          await fetch('/api/state', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(state),
          });
        } catch (e) { /* ignore */ }
      },
      async getDirectory() {
        try {
          const res = await fetch('/api/directory');
          const data = await res.json();
          return data.directory;
        } catch (e) { return null; }
      },
      async setDirectory(dir) {
        try {
          const res = await fetch('/api/directory', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ directory: dir }),
          });
          const data = await res.json();
          return data.ok ? data.directory : null;
        } catch (e) { return null; }
      },
      async browse(dirPath) {
        try {
          const res = await fetch('/api/browse?path=' + encodeURIComponent(dirPath || ''));
          return await res.json();
        } catch (e) { return null; }
      },
    };
  </script>

// ─── Transposition ──────────────────────────────────────────────────
// Chromatic spellings — right arrow walks the sharp row, left arrow walks the flat row.
// D♯ / G♯ / A♯ have no valid major-key signature (they'd need double-sharps),
// so the arrow-up path uses their flat enharmonics (E♭ / A♭ / B♭) instead.
const CHROMATIC_SHARP = ["C","C#","D","Eb","E","F","F#","G","Ab","A","Bb","B"];
const CHROMATIC_FLAT  = ["C","Db","D","Eb","E","F","Gb","G","Ab","A","Bb","B"];
const KEY_TONIC = {
  C:0, "C#":1, Db:1, D:2, "D#":3, Eb:3, E:4, F:5, "F#":6, Gb:6,
  G:7, "G#":8, Ab:8, A:9, "A#":10, Bb:10, B:11,
};
const KEY_LABEL = {
  C:"C", "C#":"C♯", Db:"D♭", D:"D", "D#":"D♯", Eb:"E♭", E:"E", F:"F", "F#":"F♯",
  Gb:"G♭", G:"G", "G#":"G♯", Ab:"A♭", A:"A", "A#":"A♯", Bb:"B♭", B:"B",
};
// Keys whose scale spellings favor sharps when we respell transposed pitches.
const SHARP_KEYS_SET = new Set(["C","G","D","A","E","B","F#","C#"]);
// Circle-of-fifths order for the Key Signature arrows (left = more flats, right = more sharps).
const KEY_SIG_ORDER = ["Cb","Gb","Db","Ab","Eb","Bb","F","C","G","D","A","E","B","F#","C#"];
const LETTER_SEMI = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };
const ACC_DELTA = { none:0, natural:0, sharp:1, flat:-1 };
// Letter index 0..6 for scale-degree math.
const LETTER_IDX = { C:0, D:1, E:2, F:3, G:4, A:5, B:6 };
const IDX_TO_LETTER = ["C","D","E","F","G","A","B"];
// Pitch-class → [letter, accidental-symbol] spelling tables (pitch-class fallback
// when scale-degree transposition would need a double-accidental).
const SHARP_SPELL = [["C",""],["C","#"],["D",""],["D","#"],["E",""],["F",""],["F","#"],["G",""],["G","#"],["A",""],["A","#"],["B",""]];
const FLAT_SPELL  = [["C",""],["D","b"],["D",""],["E","b"],["E",""],["F",""],["G","b"],["G",""],["A","b"],["A",""],["B","b"],["B",""]];

// Sharp positions on treble staff (line/space from top, as half-steps from F5)
const SHARP_POSITIONS = { F: 0, C: 3, G: -1, D: 2, A: 5, E: 1, B: 4 };
// Flat positions on treble staff
const FLAT_POSITIONS = { B: 4, E: 1, A: 5, D: 2, G: 6, C: 3, F: 7 };

function noteToY(noteName, octave, clefMode, staff) {
  const noteOrder = { C: 0, D: 1, E: 2, F: 3, G: 4, A: 5, B: 6 };
  if (clefMode === "grand") {
    var val = octave * 7 + noteOrder[noteName];
    var onBass = staff === "bass" ? true : staff === "treble" ? false : val < 28;
    if (!onBass) {
      var refIdx = noteOrder["F"] + 5 * 7;
      return STAFF_TOP + (refIdx - val) * (LINE_SPACING / 2);
    } else {
      var refIdx = noteOrder["A"] + 3 * 7;
      return BASS_STAFF_TOP + (refIdx - val) * (LINE_SPACING / 2);
    }
  }
  var isBass = clefMode === "bass";
  var refIdx = isBass ? (noteOrder["A"] + 3 * 7) : (noteOrder["F"] + 5 * 7);
  var noteIdx = noteOrder[noteName] + octave * 7;
  return STAFF_TOP + (refIdx - noteIdx) * (LINE_SPACING / 2);
}

function yToNote(y, clefMode) {
  var staffTop = STAFF_TOP;
  var baseOctave = 5;
  var noteIdx = 3;
  if (clefMode === "bass") {
    baseOctave = 3;
    noteIdx = 5;
  } else if (clefMode === "grand") {
    var midpoint = (STAFF_TOP + 4 * LINE_SPACING + BASS_STAFF_TOP) / 2;
    if (y > midpoint) {
      staffTop = BASS_STAFF_TOP;
      baseOctave = 3;
      noteIdx = 5;
    }
  }
  var halfSteps = Math.round((y - staffTop) / (LINE_SPACING / 2));
  var idx = halfSteps;
  for (let i = 0; i < Math.abs(idx); i++) {
    if (idx > 0) { noteIdx--; if (noteIdx < 0) { noteIdx = 6; baseOctave--; } }
    else { noteIdx++; if (noteIdx > 6) { noteIdx = 0; baseOctave++; } }
  }
  if (baseOctave < 0 || baseOctave > 7) return null;
  return { name: NOTE_NAMES[noteIdx], octave: baseOctave };
}

// Walks backward from `idx` looking for a measure-level keySig override.
// Returns the song's default keySig if none found. Used anywhere a note's
// pitch depends on the current key (playback, preview, etc.).
function effectiveKeySig(measures, idx, songKeySig) {
  for (let i = idx; i >= 0 && i < (measures || []).length; i--) {
    const ks = measures[i] && measures[i].keySig;
    if (ks) return ks;
  }
  return songKeySig;
}

function noteToFreq(name, octave, accidental, keySigId) {
  const semitones = { C: -9, D: -7, E: -5, F: -4, G: -2, A: 0, B: 2 };
  let semi = semitones[name] + (octave - 4) * 12;
  if (accidental === "sharp") semi += 1;
  else if (accidental === "flat") semi -= 1;
  else if (accidental === "natural") { /* explicit natural: no shift */ }
  else if (accidental === "none" && keySigId) {
    // Apply key signature if no explicit accidental
    const ks = KEY_SIGNATURES.find(k => k.id === keySigId);
    if (ks) {
      if (ks.sharps.includes(name)) semi += 1;
      if (ks.flats.includes(name)) semi -= 1;
    }
  }
  return 440 * Math.pow(2, semi / 12);
}

// Compute the piano-key identifier (e.g. "C4", "F#5") for a staff pitch,
// honoring the effective key signature AND folding enharmonic edge cases
// (E#→F, B#→C-next-oct, Cb→B-prev-oct, Fb→E) so the highlighted key matches
// the one that actually sounds. Used by playback, practice mode, and the
// key-highlight UI so transposed songs light up the right keys.
function pitchToPianoKey(name, octave, accidental, keySigId) {
  const SEMI = { C: -9, D: -7, E: -5, F: -4, G: -2, A: 0, B: 2 };
  let semi = SEMI[name] + (octave - 4) * 12;
  if (accidental === "sharp") semi += 1;
  else if (accidental === "flat") semi -= 1;
  else if (accidental === "natural") { /* explicit natural: no shift */ }
  else if ((accidental === "none" || accidental == null) && keySigId) {
    const ks = KEY_SIGNATURES.find(k => k.id === keySigId);
    if (ks) {
      if (ks.sharps && ks.sharps.includes(name)) semi += 1;
      if (ks.flats && ks.flats.includes(name)) semi -= 1;
    }
  }
  const midi = semi + 69; // A4 = MIDI 69
  const keyOctave = Math.floor((midi - 12) / 12);
  const pc = ((midi % 12) + 12) % 12;
  const PC_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
  return PC_NAMES[pc] + keyOctave;
}

function useIsMobile() {
  // Phones are detected by their SHORTER dimension (< 500) so a landscape
  // iPhone (~852×393) stays "mobile" while an iPad (~820×1180) never does.
  const isPhone = () => Math.min(window.innerWidth, window.innerHeight) < 500;
  const [isMobile, setIsMobile] = useState(isPhone());
  useEffect(() => {
    const handler = () => setIsMobile(isPhone());
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, []);
  return isMobile;
}

// ─── SVG Components ──────────────────────────────────────────────────

function GrandStaffBrace({ x, y1, y2 }) {
  // Unicode musical brace glyph (U+1D114) from Noto Music — same font family as
  // the clefs, so it renders identically on every OS (Google web font).
  const h = y2 - y1;
  const midY = (y1 + y2) / 2;
  const scaleX = 0.4;
  const fontSize = h * 0.985;
  return (
    <g transform={`translate(${x * (1 - scaleX)}, 0) scale(${scaleX}, 1)`}>
      <text
        x={x}
        y={midY}
        fontSize={fontSize}
        fontFamily="'Noto Music', serif"
        fill="var(--line-color)"
        textAnchor="middle"
        dominantBaseline="central"
      >{"\uD834\uDD14"}</text>
    </g>
  );
}

function StaffLines({ x, width, top }) {
  var t = top || STAFF_TOP;
  return Array.from({ length: 5 }, (_, i) => (
    <line key={i}
      x1={x} y1={t + i * LINE_SPACING}
      x2={x + width} y2={t + i * LINE_SPACING}
      stroke="#a855f7" strokeWidth={2} />
  ));
}

function LedgerLines({ x, y, noteRx, staffTop }) {
  const lines = [];
  const topLine = staffTop != null ? staffTop : STAFF_TOP;
  const bottomLine = topLine + 4 * LINE_SPACING;
  if (y < topLine) {
    for (let ly = topLine - LINE_SPACING; ly >= y - 1; ly -= LINE_SPACING) {
      lines.push(<line key={ly} x1={x - noteRx - 8} y1={ly} x2={x + noteRx + 8} y2={ly}
        stroke="#a855f7" strokeWidth={2} />);
    }
  }
  if (y > bottomLine) {
    for (let ly = bottomLine + LINE_SPACING; ly <= y + 1; ly += LINE_SPACING) {
      lines.push(<line key={ly} x1={x - noteRx - 8} y1={ly} x2={x + noteRx + 8} y2={ly}
        stroke="#a855f7" strokeWidth={2} />);
    }
  }
  return lines;
}

function NoteHead({ x, y, duration, accidental, isRest, isPlaying, isSelected, noteName, noteOctave, onClick, onMouseDown, onTouchStart, isMobile, showFlag = true, forceStemDirection, staffTop, isBassStaff, stemShorten = 0, chord = null }) {
  // Sixteenth notes get slightly longer stems so the two beams have
  // breathing room and don't crowd the notehead.
  const extraStem = duration === "sixteenth" ? 10 : 0;
  const sHeight = STEM_HEIGHT + extraStem - stemShorten;
  const NOTE_COLORS = { C: "var(--c-color)", D: "var(--d-color)", E: "var(--e-color)", F: "var(--f-color)", G: "var(--g-color)", A: "var(--a-color)", B: "var(--b-color)" };
  const noteColor = NOTE_COLORS[noteName] || "var(--note-color)";
  const hitPad = 16;

  if (isRest) {
    const rectWidth = 44;
    const rectHeight = LINE_SPACING / 2;
    // Rests get the same selection highlight as notes — owner needs to see
    // what's selected in order to delete it.
    const restFill = isSelected ? "var(--select)" : "#1a1a1a";
    // Rest positions anchor to the note's own staffTop so bass-staff rests
    // draw inside the bass staff, not the treble staff.
    const sTop = staffTop != null ? staffTop : STAFF_TOP;
    // Whole rest: hangs DOWN from 4th line (from bottom)
    if (duration === "whole") {
      const line4 = sTop + 1 * LINE_SPACING; // 4th line from bottom
      return (
        <g onClick={onClick} onMouseDown={onMouseDown} onTouchStart={onTouchStart} style={{ cursor: "pointer" }}>
          <rect x={x - hitPad} y={sTop} width={hitPad * 2} height={LINE_SPACING * 4} fill="transparent" />
          <rect x={x - rectWidth / 2} y={line4} width={rectWidth} height={rectHeight}
            fill={restFill} stroke="none" />
        </g>
      );
    }
    // Half rest: sits ON the 3rd line (from bottom), top reaches halfway to 4th line
    if (duration === "half") {
      const line3 = sTop + 2 * LINE_SPACING; // 3rd line from bottom
      return (
        <g onClick={onClick} onMouseDown={onMouseDown} onTouchStart={onTouchStart} style={{ cursor: "pointer" }}>
          <rect x={x - hitPad} y={sTop} width={hitPad * 2} height={LINE_SPACING * 4} fill="transparent" />
          <rect x={x - rectWidth / 2} y={line3 - rectHeight} width={rectWidth} height={rectHeight}
            fill={restFill} stroke="none" />
        </g>
      );
    }
    // Sixteenth rest: Unicode character spanning from 1st line to near 4th line
    if (duration === "sixteenth") {
      return (
        <g onClick={onClick} onMouseDown={onMouseDown} onTouchStart={onTouchStart} style={{ cursor: "pointer" }}>
          <rect x={x - hitPad} y={sTop} width={hitPad * 2} height={LINE_SPACING * 4} fill="transparent" />
          <text x={x} y={sTop + 4.5 * LINE_SPACING} textAnchor="middle" fontSize={LINE_SPACING * 3.8}
            fill={restFill} fontFamily="'Noto Music', serif"
            style={{ pointerEvents: "none" }}>𝄿</text>
        </g>
      );
    }
    // Eighth rest: Unicode character - one dot and hook, spans ~2 lines
    if (duration === "eighth") {
      return (
        <g onClick={onClick} onMouseDown={onMouseDown} onTouchStart={onTouchStart} style={{ cursor: "pointer" }}>
          <rect x={x - hitPad} y={sTop} width={hitPad * 2} height={LINE_SPACING * 4} fill="transparent" />
          <text x={x} y={sTop + 3.85 * LINE_SPACING} textAnchor="middle" fontSize={LINE_SPACING * 3.5}
            fill={restFill} fontFamily="'Noto Music', serif"
            style={{ pointerEvents: "none" }}>𝄾</text>
        </g>
      );
    }
    // Quarter rest: Unicode character
    return (
      <g onClick={onClick} onMouseDown={onMouseDown} onTouchStart={onTouchStart} style={{ cursor: "pointer" }}>
        <rect x={x - hitPad} y={sTop} width={hitPad * 2} height={LINE_SPACING * 4} fill="transparent" />
        <text x={x} y={sTop + 3.8 * LINE_SPACING} textAnchor="middle" fontSize={LINE_SPACING * 3.5}
          fill={restFill} fontFamily="'Noto Music', serif"
          style={{ pointerEvents: "none" }}>𝄽</text>
      </g>
    );
  }

  const isFilled = duration !== "whole" && duration !== "half";
  const hasStem = duration !== "whole";
  const sTop = staffTop != null ? staffTop : STAFF_TOP;
  // Stems flip at each staff's middle line:
  //   Treble middle line = B4 → B4 and above get stems down.
  //   Bass   middle line = D3 → D3 and above get stems down.
  const stemThresholdY = sTop + 2 * LINE_SPACING;
  const stemUp = forceStemDirection !== undefined ? forceStemDirection === "up" : y > stemThresholdY;
  const hasFlag = duration === "eighth" || duration === "sixteenth";
  const outlineColor = isSelected ? "var(--select)" : noteColor;
  const fillColor = isSelected ? "var(--select)" : noteColor;

  return (
    <g onClick={onClick} onMouseDown={onMouseDown} onTouchStart={onTouchStart} style={{ cursor: "pointer" }}>
      <rect x={x - NOTE_RX - hitPad} y={y - NOTE_RY - hitPad}
        width={(NOTE_RX + hitPad) * 2} height={(NOTE_RY + hitPad) * 2}
        fill="transparent" />
      {/* Rainbow arc behind the playing note */}
      {isPlaying && (
        <g style={{ pointerEvents: "none" }}>
          <path d={`M ${x - 44} ${y + 6} A 44 44 0 0 1 ${x + 44} ${y + 6}`} fill="none" stroke="#ff3b30" strokeWidth={3} strokeLinecap="butt" />
          <path d={`M ${x - 41} ${y + 6} A 41 41 0 0 1 ${x + 41} ${y + 6}`} fill="none" stroke="#ff9500" strokeWidth={3} strokeLinecap="butt" />
          <path d={`M ${x - 38} ${y + 6} A 38 38 0 0 1 ${x + 38} ${y + 6}`} fill="none" stroke="#ffcc00" strokeWidth={3} strokeLinecap="butt" />
          <path d={`M ${x - 35} ${y + 6} A 35 35 0 0 1 ${x + 35} ${y + 6}`} fill="none" stroke="#34c759" strokeWidth={3} strokeLinecap="butt" />
          <path d={`M ${x - 32} ${y + 6} A 32 32 0 0 1 ${x + 32} ${y + 6}`} fill="none" stroke="#3498db" strokeWidth={3} strokeLinecap="butt" />
          <path d={`M ${x - 29} ${y + 6} A 29 29 0 0 1 ${x + 29} ${y + 6}`} fill="none" stroke="#9b59b6" strokeWidth={3} strokeLinecap="butt" />
        </g>
      )}
      <LedgerLines x={x} y={y} noteRx={NOTE_RX} staffTop={staffTop} />
      {/* Stem and flag drawn BEFORE note head so outline goes behind. When
          the note carries chord members, the stem extends to reach the
          farthest pitch (highest for stems-up, lowest for stems-down) and
          gets a pitch-colored gradient with a stop at each chord-note y. */}
      {hasStem && (() => {
        const stemX = stemUp ? x + NOTE_RX - 2 : x - NOTE_RX + 2;
        const LETTER_ORD = { C:0, D:1, E:2, F:3, G:4, A:5, B:6 };
        const primaryIdx = LETTER_ORD[noteName] + (noteOctave || 0) * 7;
        const chordPitches = (chord || []).map(c => {
          const ci = LETTER_ORD[c.name] + c.octave * 7;
          return { name: c.name, y: y + (primaryIdx - ci) * (LINE_SPACING / 2) };
        });
        const allY = [y, ...chordPitches.map(p => p.y)];
        const minY = Math.min(...allY);
        const maxY = Math.max(...allY);
        // Stem anchor = farthest head on the side AWAY from the tip.
        const stemStart = stemUp ? maxY : minY;
        const stemEnd   = stemUp ? minY - sHeight : maxY + sHeight;

        if (chordPitches.length === 0) {
          return (
            <>
              <line x1={stemX} y1={stemStart} x2={stemX} y2={stemEnd} stroke="#000" strokeWidth={5} />
              <line x1={stemX} y1={stemStart} x2={stemX} y2={stemEnd} stroke={outlineColor} strokeWidth={3} />
            </>
          );
        }
        // Gradient stops at each pitch's y along the stem.
        const stemLen = stemEnd - stemStart;
        const pitches = [
          { name: noteName, y: y, color: noteColor },
          ...chordPitches.map(p => ({ name: p.name, y: p.y, color: NOTE_COLORS[p.name] || "var(--note-color)" })),
        ].sort((a, b) => stemUp ? b.y - a.y : a.y - b.y);
        // "from" (stemStart) at the anchor end, "to" (stemEnd) at the tip.
        const gradId = `stem-grad-${Math.round(x)}-${Math.round(y)}`;
        return (
          <>
            <line x1={stemX} y1={stemStart} x2={stemX} y2={stemEnd} stroke="#000" strokeWidth={5} />
            <defs>
              <linearGradient id={gradId} gradientUnits="userSpaceOnUse" x1={stemX} y1={stemStart} x2={stemX} y2={stemEnd}>
                {pitches.map((p, i) => {
                  const t = stemLen === 0 ? 0 : Math.max(0, Math.min(1, (p.y - stemStart) / stemLen));
                  return <stop key={`s-${i}`} offset={(t * 100).toFixed(1) + '%'} stopColor={p.color} />;
                })}
                <stop offset="100%" stopColor={pitches[pitches.length - 1].color} />
              </linearGradient>
            </defs>
            <line x1={stemX} y1={stemStart} x2={stemX} y2={stemEnd} stroke={`url(#${gradId})`} strokeWidth={3} />
          </>
        );
      })()}
      {accidental === "sharp" && (
        <text x={x - NOTE_RX - 30} y={y + 22} textAnchor="middle" fontSize={60} fill={outlineColor} fontWeight="bold">♯</text>
      )}
      {accidental === "flat" && (
        <text x={x - NOTE_RX - 30} y={y + 14} textAnchor="middle" fontSize={60} fill={outlineColor} fontWeight="bold">♭</text>
      )}
      {accidental === "natural" && (
        <text x={x - NOTE_RX - 30} y={y + 27} textAnchor="middle" fontSize={72} fill={outlineColor} fontWeight="bold">♮</text>
      )}
      <ellipse cx={x} cy={y} rx={NOTE_RX} ry={NOTE_RY}
        fill={(duration === "whole" || duration === "half") ? outlineColor : (isFilled ? fillColor : "transparent")}
        stroke="#000"
        strokeWidth={2} transform={`rotate(-12, ${x}, ${y})`} />
      {duration === "whole" && (
        <ellipse cx={x + 1} cy={y} rx={NOTE_RX * 0.55} ry={NOTE_RY * 0.7}
          fill="var(--bg)" stroke="none" transform={`rotate(35, ${x + 1}, ${y})`} />
      )}
      {duration === "half" && (
        <ellipse cx={x} cy={y} rx={NOTE_RX * 0.6} ry={NOTE_RY * 0.65}
          fill="var(--bg)" stroke="none" transform={`rotate(-12, ${x}, ${y})`} />
      )}
      {hasFlag && showFlag && (() => {
        // Filled music-notation flag (Bravura-style). One shape per flag,
        // mirrored both horizontally and vertically for stem-down notes.
        const xs = stemUp ? x + NOTE_RX - 2 : x - NOTE_RX + 2;
        const ys = stemUp ? y - sHeight : y + sHeight;
        // Flag always curves to the RIGHT (x offsets positive). The vertical
        // direction flips so the flag curves toward the head for stems-down,
        // placing it on the right side of the stem and under the head.
        const yDir = stemUp ? 1 : -1;
        const flagAt = (offset) => {
          const sy = ys + offset * yDir;
          return `M${xs},${sy} c${16},${6 * yDir} ${22},${18 * yDir} ${12},${36 * yDir} c${10},${-14 * yDir} ${4},${-22 * yDir} ${-12},${-20 * yDir} z`;
        };
        const d = flagAt(0) + (duration === "sixteenth" ? " " + flagAt(14) : "");
        return <path d={d} fill={outlineColor} stroke="#000" strokeWidth={2} strokeLinejoin="round" style={{ pointerEvents: "none" }} />;
      })()}
      <text x={x} y={y + 6} textAnchor="middle" fontSize={18}
        fill="#000000" fontWeight="700" fontFamily="'DM Sans', sans-serif"
        style={{ pointerEvents: "none" }}>{noteName}</text>
      {/* Chord members — extra pitches stacked on the same stem. They share
          the primary note's duration, but each carries its own accidental and
          gets its own ledger lines if outside the staff. No per-member stem /
          flag / tie — those attach to the primary head. */}
      {chord && chord.length > 0 && (() => {
        const LETTER_ORD = { C:0, D:1, E:2, F:3, G:4, A:5, B:6 };
        const primaryIdx = LETTER_ORD[noteName] + (noteOctave || 0) * 7;
        return chord.map((cn, ci) => {
          const cIdx = LETTER_ORD[cn.name] + cn.octave * 7;
          const cy = y + (primaryIdx - cIdx) * (LINE_SPACING / 2);
          const cColor = NOTE_COLORS[cn.name] || "var(--note-color)";
          return (
            <g key={`chord-${ci}`} style={{ pointerEvents: "none" }}>
              <LedgerLines x={x} y={cy} noteRx={NOTE_RX} staffTop={staffTop} />
              {cn.accidental === "sharp" && (
                <text x={x - NOTE_RX - 30} y={cy + 22} textAnchor="middle" fontSize={60} fill={cColor} fontWeight="bold">♯</text>
              )}
              {cn.accidental === "flat" && (
                <text x={x - NOTE_RX - 30} y={cy + 14} textAnchor="middle" fontSize={60} fill={cColor} fontWeight="bold">♭</text>
              )}
              {cn.accidental === "natural" && (
                <text x={x - NOTE_RX - 30} y={cy + 27} textAnchor="middle" fontSize={72} fill={cColor} fontWeight="bold">♮</text>
              )}
              <ellipse cx={x} cy={cy} rx={NOTE_RX} ry={NOTE_RY}
                fill={(duration === "whole" || duration === "half") ? cColor : cColor}
                stroke="#000" strokeWidth={2} transform={`rotate(-12, ${x}, ${cy})`} />
              {duration === "whole" && (
                <ellipse cx={x + 1} cy={cy} rx={NOTE_RX * 0.55} ry={NOTE_RY * 0.7}
                  fill="var(--bg)" stroke="none" transform={`rotate(35, ${x + 1}, ${cy})`} />
              )}
              {duration === "half" && (
                <ellipse cx={x} cy={cy} rx={NOTE_RX * 0.6} ry={NOTE_RY * 0.65}
                  fill="var(--bg)" stroke="none" transform={`rotate(-12, ${x}, ${cy})`} />
              )}
              <text x={x} y={cy + 6} textAnchor="middle" fontSize={18}
                fill="#000000" fontWeight="700" fontFamily="'DM Sans', sans-serif">{cn.name}</text>
            </g>
          );
        });
      })()}
    </g>
  );
}

    <g>
      <line x1={x} y1={STAFF_TOP} x2={x} y2={STAFF_TOP + 4 * LINE_SPACING}
        stroke="var(--line-color)" strokeWidth={2} />
      <text x={x + 6} y={STAFF_TOP + 4 * LINE_SPACING + 2}
        fontSize={115}
        fill="var(--clef-color)"
        fontFamily="'Noto Music', 'Noto Serif', serif"

function TimeSignature({ x, top, bottom, bassClef }) {
  var sTop = bassClef ? BASS_STAFF_TOP : STAFF_TOP;
  return (
    <g>
      <text x={x} y={sTop + 1.7 * LINE_SPACING} textAnchor="middle" fontSize={60}
        fontWeight="bold" fill="var(--line-color)" fontFamily="'Libre Baskerville', serif">{top}</text>
      <text x={x} y={sTop + 3.7 * LINE_SPACING} textAnchor="middle" fontSize={60}
        fontWeight="bold" fill="var(--line-color)" fontFamily="'Libre Baskerville', serif">{bottom}</text>
    </g>
  );
}

// Given an old → new key signature transition, returns the symbols to
// display at the modulation point (naturals cancelling the outgoing key,
// then the new sharps/flats).
function keyChangeSymbols(oldKeyId, newKeyId) {
  const oldKs = KEY_SIGNATURES.find(k => k.id === oldKeyId) || { sharps: [], flats: [] };
  const newKs = KEY_SIGNATURES.find(k => k.id === newKeyId) || { sharps: [], flats: [] };
  const out = [];
  for (const s of oldKs.sharps) if (!newKs.sharps.includes(s)) out.push({ note: s, symbol: '♮', useSharpPos: true });
  for (const f of oldKs.flats)  if (!newKs.flats.includes(f))  out.push({ note: f, symbol: '♮', useSharpPos: false });
  for (const s of newKs.sharps) if (!oldKs.sharps.includes(s)) out.push({ note: s, symbol: '♯', useSharpPos: true });
  for (const f of newKs.flats)  if (!oldKs.flats.includes(f))  out.push({ note: f, symbol: '♭', useSharpPos: false });
  return out;
}

// Renders a key-signature change inline at the start of a measure: naturals
// to cancel the outgoing key, then the new sharps/flats. A CSS class drives
// a brief pulse animation the first time it appears.
function KeyChangeDisplay({ x, oldKey, newKey, bassClef }) {
  const changes = keyChangeSymbols(oldKey, newKey);
  if (changes.length === 0) return null;
  const sTop = bassClef ? BASS_STAFF_TOP : STAFF_TOP;
  return (
    <g className="key-change-anim">
      {changes.map((c, i) => {
        const positions = c.useSharpPos ? SHARP_POSITIONS : FLAT_POSITIONS;
        const pos = bassClef ? ((positions[c.note] ?? 0) + 1) : (positions[c.note] ?? 0);
        const y = sTop + pos * (LINE_SPACING / 2);
        const yAdj = c.symbol === '♭' ? y + 14 : y + 22;
        return (
          <text key={i} x={x + i * 30} y={yAdj}
            fontSize={52} fontWeight="bold" fill="var(--line-color)"
            textAnchor="middle">{c.symbol}</text>
        );
      })}
    </g>
  );
}

function KeySignatureDisplay({ x, keySigId, bassClef }) {
  const ks = KEY_SIGNATURES.find(k => k.id === keySigId);
  if (!ks || (ks.sharps.length === 0 && ks.flats.length === 0)) return null;
  var sTop = bassClef ? BASS_STAFF_TOP : STAFF_TOP;

  const items = [];
  if (ks.sharps.length > 0) {
    ks.sharps.forEach((note, i) => {
      const pos = bassClef ? (SHARP_POSITIONS[note] + 1) : SHARP_POSITIONS[note];
      const y = sTop + pos * (LINE_SPACING / 2);
      items.push(
        <text key={`s${i}`} x={x + i * 36} y={y + 22}
          fontSize={60} fontWeight="bold" fill="var(--line-color)"
          textAnchor="middle">♯</text>
      );
    });
  } else {
    ks.flats.forEach((note, i) => {
      const pos = bassClef ? (FLAT_POSITIONS[note] + 1) : FLAT_POSITIONS[note];
      const y = sTop + pos * (LINE_SPACING / 2);
      items.push(
        <text key={`f${i}`} x={x + i * 32} y={y + 14}
          fontSize={60} fontWeight="bold" fill="var(--line-color)"
          textAnchor="middle">♭</text>
      );
    });
  }
  return <g>{items}</g>;
}

// Global ref to track if BPM input is focused
window._bpmFocused = false;

function BpmInput({ bpm, setBpm }) {
  const inputRef = useRef(null);
  const lastBpmRef = useRef(bpm);

  // Update input when bpm changes externally (e.g. loading a song)
  useEffect(() => {
    if (inputRef.current && bpm !== lastBpmRef.current && !window._bpmFocused) {
      inputRef.current.value = String(bpm);
      lastBpmRef.current = bpm;
    }
  }, [bpm]);

  return (
    <input ref={inputRef} type="text" inputMode="numeric" defaultValue={bpm}
      onClick={e => e.target.select()}
      onDoubleClick={e => e.target.select()}
      onFocus={e => { window._bpmFocused = true; e.target.select(); }}
      onBlur={e => {
        window._bpmFocused = false;
        const num = parseInt(e.target.value, 10);
        if (!isNaN(num) && num >= 20 && num <= 500) {
          setBpm(num);
          lastBpmRef.current = num;
          e.target.value = String(num);
        } else {
          e.target.value = String(bpm);
        }
      }}
      onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
      style={{ width: 34, height: 16, fontSize: 13, fontWeight: 600, textAlign: "center",
        background: "transparent", border: "none", borderRadius: 0,
        color: "var(--text)", padding: 0, fontFamily: "inherit", outline: "none" }}
    />
  );
}

function LibraryOverlay({ open, isAdmin, onClose, onOpenSong }) {
  // The iframe points at the same library HTML served by the server, with an
  // ?embed=1 flag so the page knows to postMessage instead of navigating when
  // a song is picked. Living in an iframe means the parent document never
  // navigates — fullscreen (and audio context, etc.) are preserved.
  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (e.origin !== window.location.origin) return;
      const d = e.data;
      if (!d || typeof d !== 'object') return;
      if (d.type === 'rpm-close-library') onClose();
      else if (d.type === 'rpm-open-song' && typeof d.title === 'string') onOpenSong(d.title);
      else if (d.type === 'rpm-profile-changed' || d.type === 'rpm-profiles-changed') {
        // Library iframe changed the active profile or profiles map. Notify
        // the host app via a custom event so it can re-read localStorage
        // without a page refresh.
        window.dispatchEvent(new CustomEvent('rpm-profiles-sync'));
      }
    };
    window.addEventListener('message', handler);
    return () => window.removeEventListener('message', handler);
  }, [open, onClose, onOpenSong]);

  if (!open) return null;
  // Admin path: <EDIT_PATH>/library (relative to current path); baby: /library.
  const src = (isAdmin
    ? window.location.pathname.replace(/\/+$/, '') + '/library'
    : '/library'
  ) + '?embed=1';

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 2500, background: "var(--bg)" }}>
      <iframe
        src={src}
        title="Song Library"
        style={{ width: "100%", height: "100%", border: 0, display: "block" }}
      />
      <button onClick={onClose} aria-label="Close library" style={{
        position: "absolute", top: 12, right: 12, zIndex: 2501,
        width: 44, height: 44, borderRadius: 22,
        background: "var(--bg3)", border: "1px solid var(--border)",
        color: "var(--text)", fontSize: 22, fontWeight: 700, cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "center",
        boxShadow: "0 2px 8px rgba(0,0,0,0.15)",
      }}>✕</button>
    </div>
  );
}

function MusicNotationEditor() {
  // Unlock audio on first user interaction
  useEffect(() => {
    let unlocked = false;
    const unlockAudio = () => {
      if (unlocked) return;
      unlocked = true;
      try {
        // Start Tone.js (synchronously call, don't await)
        Tone.start();
        // Force resume the audio context
        if (Tone.context && Tone.context.state !== "running") {
          Tone.context.resume();
        }
        // Play a silent buffer to fully unlock iOS audio
        const ctx = Tone.context.rawContext || Tone.context;
        const buffer = ctx.createBuffer(1, 1, 22050);
        const source = ctx.createBufferSource();
        source.buffer = buffer;
        source.connect(ctx.destination);
        if (source.start) source.start(0);
        // Create and play a silent test synth to fully initialize the audio graph
        const testSynth = new Tone.Synth().toDestination();
        testSynth.volume.value = -100;
        testSynth.triggerAttackRelease("C4", "32n");
        setTimeout(() => { try { testSynth.dispose(); } catch(e){} }, 100);
      } catch(e) { unlocked = false; }
      document.removeEventListener("click", unlockAudio);
      document.removeEventListener("touchstart", unlockAudio);
      document.removeEventListener("touchend", unlockAudio);
    };
    document.addEventListener("click", unlockAudio);
    document.addEventListener("touchstart", unlockAudio);
    document.addEventListener("touchend", unlockAudio);
    return () => {
      document.removeEventListener("click", unlockAudio);
      document.removeEventListener("touchstart", unlockAudio);
      document.removeEventListener("touchend", unlockAudio);
    };
  }, []);

  const [measures, setMeasuresRaw] = useState([
    { notes: [] }, { notes: [] }, { notes: [] }, { notes: [] },
  ]);
  const undoStackRef = useRef([]);
  const redoStackRef = useRef([]);
  const isUndoRedoRef = useRef(false);

  const setMeasures = useCallback((updater) => {
    setMeasuresRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      if (!isUndoRedoRef.current) {
        undoStackRef.current.push(JSON.stringify(prev));
        if (undoStackRef.current.length > 50) undoStackRef.current.shift();
        redoStackRef.current = [];
      }
      isUndoRedoRef.current = false;
      return next;
    });
  }, []);

  const copyNotes = useCallback(() => {
    const notesToCopy = selectedNotes.length > 0 ? selectedNotes : (selectedNote ? [selectedNote] : []);
    if (notesToCopy.length === 0) return;
    // Sort by measure then note index
    const sorted = [...notesToCopy].sort((a, b) => a.measure - b.measure || a.note - b.note);
    clipboardRef.current = sorted.map(s => {
      const note = measures[s.measure]?.notes[s.note];
      return note ? JSON.parse(JSON.stringify(note)) : null;
    }).filter(Boolean);
  }, [selectedNotes, selectedNote, measures]);

  const pasteNotes = useCallback(() => {
    if (clipboardRef.current.length === 0) {
      console.log("Nothing in clipboard");
      return;
    }
    if (!selectedNote) {
      console.log("No note selected for paste position");
      return;
    }
    const targetMi = selectedNote.measure;
    setMeasures(prev => {
      const next = [...prev];
      const targetMeasure = next[targetMi];
      const newNotes = [...targetMeasure.notes];
      const insertAt = selectedNote.note + 1;
      const pasted = clipboardRef.current.map(n => ({ ...n, id: Date.now() + Math.random(), x: 0 }));
      newNotes.splice(insertAt, 0, ...pasted);
      next[targetMi] = { ...targetMeasure, notes: distributeNotes(newNotes) };
      return next;
    });
  }, [selectedNote, setMeasures, distributeNotes]);

  const undo = useCallback(() => {

      const notes = m.notes.map((note) => {
        const baseDur = NOTE_DURATIONS.find(d => d.id === note.duration)?.beats || 1;
        const dur = note.dotted ? baseDur * 1.5 : note.triplet ? 1 / 3 : baseDur;
        const staffKey = note.staff === "bass" ? "bass" : "treble";
        const x = 80 + offsets[staffKey] * beatSize;
        offsets[staffKey] += dur;
        return { ...note, x };
      });

  // MusicXML import — converts a .xml / .musicxml / .mxl file into a NoteForge
  // song JSON and saves it under a unique filename (never overwrites).
  // MVP scope: pitches + durations (whole..16th, dots, triplets), rests, grand-staff
  // assignment, time signature, tempo, repeat barlines. Key-sig is flattened to C
  // with explicit per-note accidentals (per the project's spelling convention).
  const parseMusicXMLDoc = useCallback((doc) => {
    const title = doc.querySelector('work > work-title, movement-title')?.textContent?.trim() || 'Imported Song';
    const composer = doc.querySelector('creator[type="composer"]')?.textContent?.trim() || '';
    const allPartsRaw = Array.from(doc.querySelectorAll('part'));
    if (allPartsRaw.length === 0) throw new Error('No <part> element found');

    // MusicXML <fifths> → R&P Music key signature. Major-key names only;
    // minor mode still uses the major-equivalent keySig (same accidentals).
    const FIFTHS_TO_KEY = {
      '-7':'Cb','-6':'Gb','-5':'Db','-4':'Ab','-3':'Eb','-2':'Bb','-1':'F',
      '0':'C',
      '1':'G','2':'D','3':'A','4':'E','5':'B','6':'F#','7':'C#',
    };

    // Inspect every part's first <clef> sign and <staves> count so we can
    // decide whether to merge parts into a grand staff. A vocal + piano score
    // shows up as two parts (treble + (treble-or-grand)); a piano-solo score
    // shows up as one part with <staves>2</staves>. A pure grand staff both
    // staves should import; a solo-plus-piano score should drop the piano.
    const partMetaRaw = allPartsRaw.map(p => {
      const firstAttrs = p.querySelector('attributes');
      const staves = parseInt(firstAttrs?.querySelector('staves')?.textContent || '1');
      const signs = Array.from(firstAttrs?.querySelectorAll('clef') || [])
        .map(c => (c.querySelector('sign')?.textContent || 'G').trim());
      return { part: p, staves, signs };
    });

    // Hard rule: a standalone single-staff treble part stacked above a grand
    // staff (or above a separate bass part) is a solo/vocal line + piano
    // accompaniment. Import ONLY the solo — piano voices on their own staves
    // would otherwise get merged into the treble/bass of the output and
    // clobber the melody. A pure grand staff (single part, staves=2) or a
    // lone single-staff part falls through and imports normally.
    const isSoloPlusPiano = partMetaRaw.length >= 2
      && partMetaRaw.some(pm => pm.staves === 1 && pm.signs.length === 1 && pm.signs[0] === 'G')
      && partMetaRaw.some(pm => pm.staves >= 2 || pm.signs.includes('F'));
    const soloIdx = isSoloPlusPiano
      ? partMetaRaw.findIndex(pm => pm.staves === 1 && pm.signs.length === 1 && pm.signs[0] === 'G')
      : -1;
    const allParts = isSoloPlusPiano ? [allPartsRaw[soloIdx]] : allPartsRaw;
    const partMeta = isSoloPlusPiano ? [partMetaRaw[soloIdx]] : partMetaRaw;
    const anyPartMultiStaff = partMeta.some(pm => pm.staves >= 2);
    // Mixed clefs only counts as grand when there's more than one part —
    // a single-part bass-clef file should stay a single bass-clef song.
    const allClefs = new Set(partMeta.flatMap(pm => pm.signs));
    const hasMixedClefsAcrossParts = partMeta.length > 1 && allClefs.size > 1;
    const isGrand = anyPartMultiStaff || hasMixedClefsAcrossParts;

    // Per part: figure out which voice is "primary" for each staff. Needed
    // because piano LH is often voice 2 (staff 2), not voice 1 — our old
    // voice-1-only filter dropped all bass notes. We take the first voice
    // that appears in each staff within each part.
    const primaryVoicePerPartStaff = partMeta.map(({ part }) => {
      const map = {};
      for (const m of part.querySelectorAll('measure')) {
        for (const el of Array.from(m.children)) {
          if (el.tagName !== 'note') continue;
          if (el.querySelector(':scope > chord')) continue;
          const st = parseInt(el.querySelector(':scope > staff')?.textContent || '1');
          const vo = parseInt(el.querySelector(':scope > voice')?.textContent || '1');
          if (map[st] === undefined) map[st] = vo;
        }
      }
      return map;
    });

    let divisions = 1;
    let parsedTimeSig = { top: 4, bottom: 4 };
    let parsedBpm = 120;
    let songKeySig = 'C';          // first measure's key
    let currentKeySig = 'C';       // running key — updates on mid-piece key changes
    const outMeasures = [];
    let idCounter = Date.now();

    // Quarter-note beats per duration name. Dotted/triplet applied separately.
    const DUR_BEATS = { whole: 4, half: 2, quarter: 1, eighth: 0.5, sixteenth: 0.25 };
    const noteBeats = (n) => {
      let b = DUR_BEATS[n.duration] || 1;
      if (n.dotted) b *= 1.5;
      if (n.triplet) b *= 2 / 3;
      return b;
    };
    // Greedy break of a gap (in quarter-note beats) into standard rest values.
    const buildRests = (gap, staff) => {
      const CHUNKS = [
        { d: 4,     duration: 'whole',     dotted: false },
        { d: 3,     duration: 'half',      dotted: true  },
        { d: 2,     duration: 'half',      dotted: false },
        { d: 1.5,   duration: 'quarter',   dotted: true  },
        { d: 1,     duration: 'quarter',   dotted: false },
        { d: 0.75,  duration: 'eighth',    dotted: true  },
        { d: 0.5,   duration: 'eighth',    dotted: false },
        { d: 0.375, duration: 'sixteenth', dotted: true  },
        { d: 0.25,  duration: 'sixteenth', dotted: false },
      ];
      const rests = [];
      let rem = gap;
      while (rem > 0.01) {
        const c = CHUNKS.find(ch => ch.d <= rem + 0.01);
        if (!c) break;
        rests.push({
          id: idCounter++, x: 80,
          name: 'B', octave: 4, duration: c.duration, dotted: c.dotted,
          triplet: false, accidental: 'none', isRest: true, staff, lyric: ''
        });
        rem -= c.d;
      }
      return rests;
    };

    // Measure count = max across all parts.
    const measureCount = Math.max(...allParts.map(p => p.querySelectorAll('measure').length));
    for (let mi = 0; mi < measureCount; mi++) {
      const measureProps = {};
      const nfNotes = [];

      // Iterate every part for this measure index, merging their notes.
      allParts.forEach((part, partIdx) => {
        const partMeasures = part.querySelectorAll('measure');
        const m = partMeasures[mi];
        if (!m) return;
        const meta = partMeta[partIdx];
        const primaryVoice = primaryVoicePerPartStaff[partIdx];

        // Barlines — first part's barlines win (they're normally consistent).
        if (partIdx === 0) {
          for (const bar of m.querySelectorAll('barline')) {
            const repeat = bar.querySelector('repeat');
            if (repeat) {
              const dir = repeat.getAttribute('direction');
              if (dir === 'forward') measureProps.repeatStart = true;
              if (dir === 'backward') measureProps.repeat = true;
            }
          }
        }

        // Attributes — first part's attributes win (they should match).
        const attrs = m.querySelector('attributes');
        if (attrs && partIdx === 0) {
          const divEl = attrs.querySelector('divisions');
          if (divEl) divisions = parseInt(divEl.textContent) || divisions;
          const timeEl = attrs.querySelector('time');
          if (timeEl) {
            const beats = parseInt(timeEl.querySelector('beats')?.textContent);
            const beatType = parseInt(timeEl.querySelector('beat-type')?.textContent);
            if (beats && beatType) parsedTimeSig = { top: beats, bottom: beatType };
          }
          const keyEl = attrs.querySelector('key');
          if (keyEl) {
            const fifthsStr = (keyEl.querySelector('fifths')?.textContent || '').trim();
            const newKey = FIFTHS_TO_KEY[fifthsStr];
            if (newKey && newKey !== currentKeySig) {
              if (mi === 0) songKeySig = newKey;
              else measureProps.keySig = newKey;
              currentKeySig = newKey;
            }
          }
        }

        // Tempo
        if (partIdx === 0) {
          const tempoEl = m.querySelector('sound[tempo]');
          if (tempoEl) {
            const t = parseFloat(tempoEl.getAttribute('tempo'));
            if (t) parsedBpm = t;
          }
        }

        // Notes within this part
        for (const el of Array.from(m.children)) {
          if (el.tagName !== 'note') continue;
          const isChordMember = !!el.querySelector(':scope > chord');
          const staffNum = parseInt(el.querySelector(':scope > staff')?.textContent || '1');
          const voice = parseInt(el.querySelector(':scope > voice')?.textContent || '1');
          // Keep only the primary voice for this (part, staff) — drops piano
          // inner voices / harmony, keeps the top line of each staff.
          if (primaryVoice[staffNum] !== undefined && voice !== primaryVoice[staffNum]) continue;

        // Treble vs bass. When the piece resolves to a grand staff, we pick
        // based on (a) this part's clef for that staff-number, then (b) the
        // part's first clef as a fallback. Multi-part vocal+piano files often
        // have one part per clef; piano-solo files have a single part with
        // staff 1 = treble, staff 2 = bass.
        let staff;
        if (isGrand) {
          const partClefForStaff = meta.signs[staffNum - 1] || meta.signs[0] || 'G';
          staff = partClefForStaff === 'F' ? 'bass' : 'treble';
        } else {
          staff = (meta.signs[0] === 'F') ? 'bass' : 'treble';
        }

        // Chord member: extract just the pitch and attach to the most recent
        // primary note on the same staff. Don't create a new note entry.
        if (isChordMember) {
          let cName = 'C', cOctave = 4, cAcc = 'none';
          const cPitch = el.querySelector(':scope > pitch');
          if (cPitch) {
            cName = cPitch.querySelector('step')?.textContent.trim() || 'C';
            cOctave = parseInt(cPitch.querySelector('octave')?.textContent) || 4;
            const cAccEl = el.querySelector(':scope > accidental');
            if (cAccEl) {
              const tt = (cAccEl.textContent || '').trim();
              if (tt === 'sharp') cAcc = 'sharp';
              else if (tt === 'flat') cAcc = 'flat';
              else if (tt === 'natural') cAcc = 'natural';
              else if (tt === 'double-sharp' || tt === 'sharp-sharp') cAcc = 'double-sharp';
              else if (tt === 'flat-flat') cAcc = 'double-flat';
            }
          }
          for (let i = nfNotes.length - 1; i >= 0; i--) {
            const host = nfNotes[i];
            if (host.staff !== staff || host.isRest) continue;
            const chord = [...(host.chord || []), { name: cName, octave: cOctave, accidental: cAcc }];
            nfNotes[i] = { ...host, chord };
            break;
          }
          continue;
        }

        const isRest = !!el.querySelector(':scope > rest');
        const type = el.querySelector(':scope > type')?.textContent || 'quarter';
        const dotted = !!el.querySelector(':scope > dot');

        let triplet = false;
        const timeMod = el.querySelector(':scope > time-modification');
        if (timeMod) {
          const actual = parseInt(timeMod.querySelector('actual-notes')?.textContent || '0');
          const normal = parseInt(timeMod.querySelector('normal-notes')?.textContent || '0');
          if (actual === 3 && normal === 2) triplet = true;
        }

        const durMap = {
          'whole': 'whole', 'half': 'half', 'quarter': 'quarter',
          'eighth': 'eighth', '16th': 'sixteenth', '32nd': 'sixteenth',
          'breve': 'whole'
        };
        const duration = durMap[type] || 'quarter';

        let name = 'B', octave = 4, accidental = 'none';
        if (!isRest) {
          const pitch = el.querySelector(':scope > pitch');
          if (pitch) {
            name = pitch.querySelector('step')?.textContent.trim() || 'C';
            octave = parseInt(pitch.querySelector('octave')?.textContent) || 4;
            // Use the <accidental> element (what the score visually shows),
            // not <alter> (which always reflects the sounding pitch even when
            // the accidental is implied by the key sig). Matches the memory
            // rule: don't write accidentals implied by the key signature.
            const accEl = el.querySelector(':scope > accidental');
            if (accEl) {
              const t = (accEl.textContent || '').trim();
              if (t === 'sharp') accidental = 'sharp';
              else if (t === 'flat') accidental = 'flat';
              else if (t === 'natural') accidental = 'natural';
              else if (t === 'double-sharp' || t === 'sharp-sharp') accidental = 'double-sharp';
              else if (t === 'flat-flat') accidental = 'double-flat';
            }
          }
        }

        // Tie: MusicXML uses <tie type="start|stop"> (sound) and/or
        // <notations><tied type="start|stop"></notations> (visual).
        // We only need to know "this note is tied to the next" → tie=true.
        const tieEls = el.querySelectorAll(':scope > tie, :scope > notations > tied');
        let tie = false;
        for (const t of tieEls) {
          if (t.getAttribute('type') === 'start') { tie = true; break; }
        }

        // Lyrics: MusicXML uses <lyric number="N"> with <syllabic> + <text>.
        // Multiple <lyric> elements on one note = multiple verses. Syllabic
        // "begin"/"middle" means the word continues to the next note → append
        // a hyphen to match our "Ba-" / "by" convention.
        const lyricEls = el.querySelectorAll(':scope > lyric');
        let lyric = '';
        let verses = null;
        if (lyricEls.length) {
          const byVerse = {};
          for (const ly of lyricEls) {
            const num = parseInt(ly.getAttribute('number') || '1');
            const idx = Math.max(0, num - 1);
            let s = '';
            let pendingSyllabic = null;
            for (const c of Array.from(ly.children)) {
              if (c.tagName === 'syllabic') {
                pendingSyllabic = (c.textContent || '').trim();
              } else if (c.tagName === 'text') {
                let piece = c.textContent || '';
                if (pendingSyllabic === 'begin' || pendingSyllabic === 'middle') piece += '-';
                s += piece;
                pendingSyllabic = null;
              } else if (c.tagName === 'elision') {
                // MusicXML <elision> means "these syllables elide" (synalepha).
                // Exporters put arbitrary characters inside — sometimes U+035C
                // or similar combining marks, which SVG text can't shape
                // across font fallbacks. Normalize to U+203F UNDERTIE, the
                // Unicode standard spacing character for this purpose. It
                // renders correctly in every font with no shaping needed.
                s += '‿';
              }
            }
            byVerse[idx] = s;
          }
          const maxIdx = Math.max(...Object.keys(byVerse).map(Number));
          const arr = [];
          for (let i = 0; i <= maxIdx; i++) arr.push(byVerse[i] || '');
          lyric = arr[0] || '';
          if (arr.length > 1) verses = arr;
        }

        nfNotes.push({
          id: idCounter++, x: 80,
          name, octave, duration, dotted, triplet, accidental, isRest, staff,
          lyric,
          ...(verses ? { verses } : {}),
          tie
        });
        }
      });

      // Anacrusis (pickup) handling for the first measure: if it doesn't fill
      // the time signature, the notes are a pickup and should land at the END
      // of the measure. Prepend rests per staff so the existing monophonic
      // renderer shows them on the correct beats. If a staff is entirely
      // silent in the pickup (only rests), collapse to one consolidated rest
      // that fills the whole measure — avoids stacking two rests on that
      // staff (e.g. Brahms's Lullaby bass had a quarter rest beside our pad).
      if (mi === 0 && nfNotes.length > 0) {
        const capacity = parsedTimeSig.top * 4 / parsedTimeSig.bottom;
        const staves = Array.from(new Set(nfNotes.map(n => n.staff)));
        const padded = [];
        for (const st of staves) {
          const inStaff = nfNotes.filter(n => n.staff === st);
          const used = inStaff.reduce((s, n) => s + noteBeats(n), 0);
          const gap = capacity - used;
          if (gap > 0.01) {
            const allRests = inStaff.every(n => n.isRest);
            if (allRests) {
              // Staff is silent through the whole pickup — use one whole rest
              // (the standard "full-measure silent" symbol, regardless of
              // time signature), not a pile of smaller rests.
              padded.push({
                id: idCounter++, x: 80,
                name: 'B', octave: 4, duration: 'whole', dotted: false,
                triplet: false, accidental: 'none', isRest: true, staff: st, lyric: ''
              });
            } else {
              padded.push(...buildRests(gap, st));
              padded.push(...inStaff);
            }
          } else {
            padded.push(...inStaff);
          }
        }
        nfNotes.length = 0;
        nfNotes.push(...padded);
      }

      outMeasures.push({ ...measureProps, notes: nfNotes });
    }

    // Grand-staff if any part had multi-staff OR any part is an F-clef part.
    // Otherwise pick treble/bass from the (single) part's first clef.
    let clef = 'treble';
    if (isGrand) clef = 'grand';
    else if (partMeta[0].signs[0] === 'F') clef = 'bass';

    return {
      title, composer,
      bpm: Math.round(parsedBpm),
      keySig: songKeySig,
      songKey: songKeySig,
      timeSig: parsedTimeSig,
      difficulty: 3,
      clef,
      measures: outMeasures,
      savedAt: new Date().toISOString(),
      published: false,
    };
  }, []);

  const importMusicXML = useCallback(async (file) => {
    try {
      let xmlText;
      const name = file.name.toLowerCase();
      if (name.endsWith('.mxl')) {
        if (!window.JSZip) throw new Error('JSZip failed to load (check network)');
        const zip = await window.JSZip.loadAsync(file);
        // Prefer the rootfile listed in META-INF/container.xml
        let mainPath = null;
        const containerFile = zip.file('META-INF/container.xml');
        if (containerFile) {
          const containerXml = await containerFile.async('string');
          const containerDoc = new DOMParser().parseFromString(containerXml, 'text/xml');
          mainPath = containerDoc.querySelector('rootfile')?.getAttribute('full-path');
        }
        if (!mainPath) {
          mainPath = Object.keys(zip.files).find(n =>
            (n.endsWith('.xml') || n.endsWith('.musicxml')) && !n.startsWith('META-INF/'));
        }
        if (!mainPath) throw new Error('No MusicXML file found inside .mxl archive');
        xmlText = await zip.file(mainPath).async('string');
      } else {
        xmlText = await file.text();
      }

      const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
      if (doc.querySelector('parsererror')) throw new Error('MusicXML is malformed');

      const song = parseMusicXMLDoc(doc);

      // In jams mode the user doesn't own the server-side library — just
      // load the song into memory. No save, no refresh, no disambiguation.
      if (isJamsMode) {
        loadSongData(song);
        setSaveConfirm(`Loaded "${song.title}"`);
        setTimeout(() => setSaveConfirm(''), 2500);
        return;
      }

      // Never overwrite — disambiguate title if one already exists
      const existing = await window.noteforgeAPI.listSongs();
      const taken = new Set(existing.map(s => s.title));
      if (taken.has(song.title)) {
        let suffix = 2;
        while (taken.has(`${song.title} (${suffix})`)) suffix++;
        song.title = `${song.title} (${suffix})`;
      }

      await window.noteforgeAPI.saveSong(song);
      await refreshLibrary();
      loadSongData(song);
      setSaveConfirm(`Imported "${song.title}"`);
      setTimeout(() => setSaveConfirm(''), 2500);
    } catch (err) {
      console.error('MusicXML import failed:', err);
      alert(`Import failed: ${err.message}`);
    }
  }, [parseMusicXMLDoc, loadSongData, refreshLibrary, isJamsMode]);

  // Jams mode: accept drag-and-drop anywhere on the page so kids/parents
  // can just pull an .mxl / .xml in from Finder.
  useEffect(() => {
    if (!isJamsMode) return;
    const onDragOver = (e) => { e.preventDefault(); if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy'; };
    const onDrop = (e) => {
      e.preventDefault();
      const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (f) importMusicXML(f);
    };
    window.addEventListener('dragover', onDragOver);
    window.addEventListener('drop', onDrop);
    return () => {
      window.removeEventListener('dragover', onDragOver);
      window.removeEventListener('drop', onDrop);
    };
  }, [isJamsMode, importMusicXML]);

  const xmlImportInputRef = useRef(null);

  const confirmSaveAs = useCallback(async () => {
    if (!saveAsName.trim()) return;
    const name = saveAsName.trim();
    setTitle(name);
    setSavedTitle(name);
    setCurrentSongId(name);
    setShowSaveAs(false);
    const song = { title: name, composer, bpm, keySig, songKey, timeSig, difficulty, measures, savedAt: new Date().toISOString() };
    await window.noteforgeAPI.saveSong(song);
    await window.noteforgeAPI.saveState({ lastSong: name });
    await refreshLibrary();
    setSaveConfirm("Saved!");
    setTimeout(() => setSaveConfirm(""), 2000);
  }, [saveAsName, composer, bpm, keySig, songKey, timeSig, difficulty, clef, measures, refreshLibrary]);

  const loadFromLibrary = useCallback((song) => {
    if (hasUnsavedChanges) {
      if (!window.confirm("You have unsaved changes. Load this song anyway?")) {
        return;
      }
    }
    // Stop playback if playing
    if (isPlayingRef.current) {
      playTimeoutRef.current.forEach(clearTimeout);
      playTimeoutRef.current = [];
      setIsPlaying(false);
      isPlayingRef.current = false;
      setIsPaused(false);
      setPlayingIdx({ measure: -1, note: -1 }); setPlayingNotes({});
      setMetronomeBeat(-1);
      playStartTimeRef.current = null;
      playBpmRef.current = null;
      if (synthRef.current) { try { synthRef.current.dispose(); } catch(e){} }
    }
    // Stop metronome if running
    if (metronomeOn) {
      setMetronomeOn(false);
    }
    if (metronomeRef.current) {
      clearInterval(metronomeRef.current);
      metronomeRef.current = null;
    }
    if (metronomeTickRef.current) {
      try { metronomeTickRef.current.dispose(); } catch(e){}
      metronomeTickRef.current = null;
    }
    if (metroClickSynthRef.current) {
      try { metroClickSynthRef.current.dispose(); } catch(e){}
      metroClickSynthRef.current = null;
    }
    setMetronomeBeat(-1);
    loadSongData(song);
    undoStackRef.current = [];
    redoStackRef.current = [];
    setShowLibrary(false);
    window.noteforgeAPI.saveState({ lastSong: song.title });
    // Centering happens in the centralized useEffect (keyed on currentSongId/clef).
  }, [loadSongData, hasUnsavedChanges]);

  const deleteFromLibrary = useCallback(async (song) => {
    if (!confirm(`Move "${song.title}" to trash?`)) return;
    await window.noteforgeAPI.deleteSong(song._filename);
    await refreshLibrary();
    if (currentSongId === song.title) setCurrentSongId(null);
  }, [refreshLibrary, currentSongId]);

  const applyTransposition = useCallback((newKey, shift) => {
    const curKs = KEY_SIGNATURES.find(k => k.id === keySig);
    const curSharps = new Set(curKs ? curKs.sharps : []);
    const curFlats = new Set(curKs ? curKs.flats : []);
    const matchedKs = KEY_SIGNATURES.find(k => k.id === newKey);
    const sigSharps = new Set(matchedKs ? matchedKs.sharps : []);
    const sigFlats = new Set(matchedKs ? matchedKs.flats : []);
    // Scale-degree letter shift: moving from key Ks to Kt shifts every note's
    // letter by (tonic_letter(Kt) − tonic_letter(Ks)) mod 7. This keeps each
    // note on the same scale degree, so Three Blind Mice (E D C...) in C →
    // C♯ stays on letters E D C (displayed as E♯ D♯ C♯ via the sig), and
    // C♯ → D shifts E up to F (displayed as F♯ via D's sig).
    const srcTonicIdx = LETTER_IDX[keySig[0]] ?? 0;
    const tgtTonicIdx = LETTER_IDX[newKey[0]] ?? 0;
    const letterDelta = ((tgtTonicIdx - srcTonicIdx) % 7 + 7) % 7;
    const defaultSpell = SHARP_KEYS_SET.has(newKey) ? SHARP_SPELL : FLAT_SPELL;
    setMeasures(prev => prev.map(m => ({
      ...m,
      notes: m.notes.map(n => {
        if (n.isRest) return n;
        // Source pitch (sig-aware).
        let accDelta = ACC_DELTA[n.accidental] || 0;
        if (n.accidental === "none" || n.accidental == null) {
          if (curSharps.has(n.name)) accDelta = 1;
          else if (curFlats.has(n.name)) accDelta = -1;
        }
        const srcMidi = n.octave * 12 + LETTER_SEMI[n.name] + accDelta;
        const tgtMidi = srcMidi + shift;
        // Target letter from scale degree.
        let tgtLetterIdx = (LETTER_IDX[n.name] + letterDelta) % 7;
        let tgtLetter = IDX_TO_LETTER[tgtLetterIdx];
        // Octave and accidental chosen so tgtMidi = oct*12 + letter_semi + acc.
        let tgtOctave = Math.floor((tgtMidi - LETTER_SEMI[tgtLetter] + 6) / 12);
        let tgtAcc = tgtMidi - tgtOctave * 12 - LETTER_SEMI[tgtLetter];
        // If scale-degree letter would need a double-accidental, fall back to
        // pitch-class spelling (e.g. D♯ in C → C♯ can't be D♯♯ so becomes E♮).
        if (tgtAcc > 1 || tgtAcc < -1) {
          const tgtPc = ((tgtMidi % 12) + 12) % 12;
          const [altLetter, altSym] = defaultSpell[tgtPc];
          tgtLetter = altLetter;
          tgtOctave = Math.floor((tgtMidi - LETTER_SEMI[tgtLetter] + 6) / 12);
          tgtAcc = altSym === "#" ? 1 : altSym === "b" ? -1 : 0;
        }
        let acc = tgtAcc === 1 ? "sharp" : tgtAcc === -1 ? "flat" : "none";
        if (acc === "sharp" && sigSharps.has(tgtLetter)) acc = "none";
        else if (acc === "flat" && sigFlats.has(tgtLetter)) acc = "none";
        else if (acc === "none" && (sigSharps.has(tgtLetter) || sigFlats.has(tgtLetter))) acc = "natural";
        return {
          ...n,
          name: tgtLetter,
          octave: tgtOctave,
          accidental: acc,
        };
      })
    })));
    setSongKey(newKey);
    if (matchedKs) setKeySig(newKey);
  }, [keySig]);

  // Stop playback before transposing — notes are being respelled under the
  // scheduler, so any in-flight timeouts would play the wrong pitches.
  // Piano-key lights are always cleared (even if not currently playing) so a
  // still-lit key from a paused/ended playback doesn't hang around pointing
  // at the wrong note after the respell.
  const stopPlaybackForTranspose = () => {
    setPressedPianoKeys({});
    if (!isPlayingRef.current) return;
    playTimeoutRef.current.forEach(clearTimeout);
    playTimeoutRef.current = [];
    setIsPlaying(false);
    isPlayingRef.current = false;
    setIsPaused(false);
    setPlayingIdx({ measure: -1, note: -1 });
    setPlayingNotes({});
    setMetronomeBeat(-1);
    if (synthRef.current) { try { synthRef.current.dispose(); } catch(e){} }
  };

  // Playable piano range: A1 (MIDI 33) to C8 (MIDI 108). Transpose is
  // disabled in a direction once any note would cross those boundaries.
  const transposeRange = useMemo(() => {
    const A1_MIDI = 33, C8_MIDI = 108;
    const PC_TO_MIDI = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };
    let minMidi = Infinity, maxMidi = -Infinity;
    (measures || []).forEach((m, mi) => (m.notes || []).forEach(n => {
      if (n.isRest) return;
      const effKS = effectiveKeySig(measures, mi, keySig);
      const pitches = [{ name: n.name, octave: n.octave, accidental: n.accidental }];
      if (Array.isArray(n.chord)) pitches.push(...n.chord);
      for (const p of pitches) {
        const pk = pitchToPianoKey(p.name, p.octave, p.accidental, effKS);
        const parsed = pk.match(/^([A-G])(#?)(-?\d+)$/);
        if (!parsed) continue;
        const midi = (parseInt(parsed[3], 10) + 1) * 12 + PC_TO_MIDI[parsed[1]] + (parsed[2] === "#" ? 1 : 0);
        if (midi < minMidi) minMidi = midi;
        if (midi > maxMidi) maxMidi = midi;
      }
    }));
    if (minMidi === Infinity) return { canShiftBy: () => true, canShiftDown: true, canShiftUp: true };
    return {
      canShiftBy: (semi) => (minMidi + semi) >= A1_MIDI && (maxMidi + semi) <= C8_MIDI,
      canShiftDown: minMidi > A1_MIDI,
      canShiftUp: maxMidi < C8_MIDI,
    };
  }, [measures, keySig]);

  const transposeTo = useCallback((newKey) => {
    if (!newKey || newKey === songKey) return;
    const srcTonic = KEY_TONIC[songKey] ?? 0;
    const tgtTonic = KEY_TONIC[newKey] ?? 0;
    // Shortest-path shift so the music stays in the nearest octave.
    let shift = ((tgtTonic - srcTonic) % 12 + 12) % 12;
    if (shift > 6) shift -= 12;
    // Tritone tiebreak: shift=6 is ambiguous (±6 both land on the same pitch
    // class). Pick sign from the direction of the key change so X→Y→X
    // returns to the original octave instead of drifting up by 12.
    else if (shift === 6 && tgtTonic < srcTonic) shift = -6;
    if (!transposeRange.canShiftBy(shift)) return; // out of A1–C8
    stopPlaybackForTranspose();
    applyTransposition(newKey, shift);
  }, [songKey, applyTransposition, transposeRange]);

  const shiftKey = useCallback((delta) => {
    // Arrow clicks: shift by exactly `delta` semitones — no octave jumps.
    if (!transposeRange.canShiftBy(delta)) return; // out of A1–C8
    stopPlaybackForTranspose();
    const curTonic = KEY_TONIC[songKey] ?? 0;
