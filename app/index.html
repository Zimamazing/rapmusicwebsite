      const notes = [...next[measure].notes];
      notes.splice(note, 1);
      next[measure] = { ...next[measure], notes: distributeNotes(notes) };
      return next;
    });
    setSelectedNote(null);
  }, [selectedNote, beatsPerMeasure, distributeNotes]);

  const updateLyric = useCallback((measureIdx, noteIdx, lyric, verseIdx) => {
    setMeasures(prev => {
      const next = [...prev];
      const notes = [...next[measureIdx].notes];
      const note = { ...notes[noteIdx] };
      if (verseIdx === undefined || verseIdx === 0) {
        note.lyric = lyric;
      }
      if (verseIdx !== undefined) {
        if (!note.verses) note.verses = [note.lyric || ""];
        while (note.verses.length <= verseIdx) note.verses.push("");
        note.verses[verseIdx] = lyric;
        if (verseIdx === 0) note.lyric = lyric;
        // Trim trailing empty verses
        while (note.verses.length > 0 && !note.verses[note.verses.length - 1]) {
          note.verses.pop();
        }
      }
      notes[noteIdx] = note;
      next[measureIdx] = { ...next[measureIdx], notes };
      return next;
    });
  }, []);

  const advanceToNextNote = useCallback(() => {
    if (!selectedNote) return;
    const { measure: mi, note: ni } = selectedNote;
    // Try next note in same measure
    if (ni + 1 < measures[mi].notes.length) {
      setSelectedNote({ measure: mi, note: ni + 1 });
      return;
    }
    // Try first note in next measure
    for (let m = mi + 1; m < measures.length; m++) {
      if (measures[m].notes.length > 0) {
        setSelectedNote({ measure: m, note: 0 });
        return;
      }
    }
  }, [selectedNote, measures]);

  const lyricInputRef = useRef(null);

  // Continuous, tempo-driven smooth scroll: one rAF loop that advances a
  // virtual playhead at pxPerMs (derived from bpm) and keeps the rainbow
  // tracker parked on the left until it crosses the 7/8 mark, after which
  // the view smoothly follows at tempo speed with the tracker locked at
  // 7/8 from the left (1/8 from the right edge).
  const scrollAnimRef = useRef(null);
  useEffect(() => {
    if (!isPlaying || isPaused) {
      if (scrollAnimRef.current) { cancelAnimationFrame(scrollAnimRef.current); scrollAnimRef.current = null; }
      return;
    }
    const container = scoreAreaRef.current;
    if (!container) return;
    const ANCHOR = 7 / 8;

    const tick = () => {
      const startT = playStartTimeRef.current;
      const timeline = scrollTimelineRef.current;
      if (startT == null || !timeline.length) {
        scrollAnimRef.current = requestAnimationFrame(tick);
        return;
      }
      const elapsedMs = performance.now() - startT;
      // Interpolate the playhead x from the (time, x) timeline — so notes with
      // different durations (half / quarter / whole) are tracked by their real
      // positions, not a linear px-per-ms approximation. That way each note
      // arrives at 7/8 exactly when it begins sounding.
      //
      // After the last timeline waypoint (song done / trailing empty measures)
      // extrapolate at tempo speed so scroll keeps gliding toward the end
      // barline instead of freezing mid-staff.
      let x = timeline[0].x;
      const lastWp = timeline[timeline.length - 1];
      if (elapsedMs >= lastWp.t) {
        const currentBpm = playBpmRef.current || bpm;
        const measureDurMs = beatsPerMeasure * (60 / currentBpm) * 1000;
        const pxPerMs = measureWidth / measureDurMs;
        x = lastWp.x + (elapsedMs - lastWp.t) * pxPerMs;
      } else if (elapsedMs > timeline[0].t) {
        for (let i = 0; i < timeline.length - 1; i++) {
          const a = timeline[i], b = timeline[i + 1];
          if (elapsedMs >= a.t && elapsedMs < b.t) {
            const ratio = (elapsedMs - a.t) / (b.t - a.t);
            x = a.x + ratio * (b.x - a.x);
            break;
          }
        }
      }
      if (isWidescreen) {
        // viewBox width in SVG pixels = tabletViewW / staffScale. The note
        // needs to sit at ANCHOR of THAT width, not of tabletViewW itself.
        const visibleSvgW = tabletViewW / staffScale;
        const target = Math.min(maxViewX, x - visibleSvgW * ANCHOR);
        setTabletViewX(prev => Math.max(prev, target));
      } else {
        // Mobile: SVG width CSS = totalWidth × mobileScale × mobileZoom, but
        // viewBox width = totalWidth / staffScale. Therefore 1 SVG unit =
        // mobileScale × mobileZoom × staffScale CSS pixels. Using just
        // mobileScale here would lag the scroll behind the playhead and the
        // rainbow tracker would drift off the right edge. HARD RULE: tracker
        // must always stay on screen.
        const cssPerSvg = isMobile ? (mobileScale * (mobileZoom || 1) * staffScale) : 1;
        const endCapScroll = Math.max(0, (endBarX + STAFF_LEFT) * cssPerSvg - container.clientWidth);
        const target = Math.min(endCapScroll, Math.max(0, x * cssPerSvg - container.clientWidth * ANCHOR));
        const newScroll = Math.max(container.scrollLeft, target);
        container.scrollLeft = newScroll;
        // Sync the pinned-header translate in the SAME frame as scrollLeft —
        // relying on onScroll alone lags by one frame and the clef visibly
        // shakes during playback.
        if (isMobile) setMobileScrollX(newScroll / cssPerSvg);
      }
      scrollAnimRef.current = requestAnimationFrame(tick);
    };
    scrollAnimRef.current = requestAnimationFrame(tick);
    return () => { if (scrollAnimRef.current) cancelAnimationFrame(scrollAnimRef.current); };
  }, [isPlaying, isPaused, isMobile, isWidescreen, mobileScale, mobileZoom, tabletViewW, maxViewX, bpm, beatsPerMeasure, staffScale, endBarX]);

  // Pre-load piano sampler when Learn or Practice mode is activated
  useEffect(() => {
    if ((playMode === "learn" || playMode === "practice") && (!pianoSynthRef.current || pianoSynthRef.current.disposed)) {
      Tone.start();
      const baseUrl = "/public/piano/";
      pianoSynthRef.current = new Tone.Sampler({
        urls: {
          A0: "A0.mp3", C1: "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3", A1: "A1.mp3",
          C2: "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3", A2: "A2.mp3",
          C3: "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3", A3: "A3.mp3",
          C4: "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3", A4: "A4.mp3",
          C5: "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3", A5: "A5.mp3",
          C6: "C6.mp3", "D#6": "Ds6.mp3", "F#6": "Fs6.mp3", A6: "A6.mp3",
          C7: "C7.mp3", "D#7": "Ds7.mp3", "F#7": "Fs7.mp3", A7: "A7.mp3",
        },
        release: 1, baseUrl,
        onload: () => { pianoLoadedRef.current = true; },
      }).toDestination();
      pianoSynthRef.current.volume.value = 0;
    }
  }, [playMode]);

  // Stop and tear down the metronome whenever the user shifts play mode.
  useEffect(() => {
    if (metronomeOn) setMetronomeOn(false);
    if (metronomeRef.current) { clearInterval(metronomeRef.current); metronomeRef.current = null; }
    if (metronomeTickRef.current) { try { metronomeTickRef.current.dispose(); } catch(e){} metronomeTickRef.current = null; }
    if (metroClickSynthRef.current) { try { metroClickSynthRef.current.dispose(); } catch(e){} metroClickSynthRef.current = null; }
    setMetronomeBeat(-1);
  }, [playMode]);

  // Switching baby↔edit should drop any active play mode so its disabled
  // states (metronome, play button, BPM slider) don't carry into edit mode.
  useEffect(() => {
    setPlayMode(null);
  }, [childLock]);

  // Practice mode doesn't make sense on grand staff (two staves, ambiguous
  // key matches). Drop it if the user switches to grand while practicing.
  useEffect(() => {
    if (clef === "grand" && playMode === "practice") setPlayMode(null);
  }, [clef, playMode]);

  // Phones are always baby mode — edit mode isn't usable at phone screen size
  // (staff interactions block, toolbars don't fit). Force childLock back to
  // true if a stale login or a stored flag tries to open edit on mobile.
  useEffect(() => {
    if (isMobile && !childLock) setChildLock(true);
  }, [isMobile, childLock]);

  // Position the starting measure flush against the pinned clef/key-sig/time-sig
  // header. For songs with a start-repeat, the repeat barline lands next to the
  // time signature; otherwise measure 0 does.
  //
  // `measures` is intentionally NOT in the dep list: dragging a note rewrites
  // the measures array on every mousemove, and that would snap the edit-mode
  // view back to the start, stealing the user's scroll position mid-edit.
  // The repeatStart lookup still reads current measures; it just re-runs on
  // song/clef/mode changes, not on individual note edits.
  useEffect(() => {
    if (!currentSongId) return;
    const repeatStartMi = measures.findIndex(m => m.repeatStart);
    const firstMi = repeatStartMi >= 0 ? repeatStartMi : 0;
    const svgX = firstMi * measureWidth;
    if (isWidescreen) {
      setTabletViewX(svgX);
    }
    if (scoreAreaRef.current) {
      const scale = isMobile ? mobileScale : 1;
      scoreAreaRef.current.scrollLeft = Math.max(0, svgX * scale);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [currentSongId, clef, isWidescreen, isMobile, mobileScale, tabletViewW, playMode]);

  // Practice mode: monotonic scroll — the rainbow note rides the center once
  // the view starts tracking it, but stays parked near the pinned header
  // until then. When the sequence loops back (end-repeat → start-repeat, or
  // full-sequence wrap), the rainbow jumps backward; reset the view so the
  // looped-to note is visible again instead of stuck off-screen right.
  useEffect(() => {
    if (playMode !== "practice") {
      prevPracticeNoteXRef.current = -Infinity;
      return;
    }
    const note = measures[practicePos.measure]?.notes[practicePos.note];
    if (!note) return;
    const noteX = contentStart + practicePos.measure * measureWidth + note.x;
    const prevNoteX = prevPracticeNoteXRef.current;
    prevPracticeNoteXRef.current = noteX;
    if (prevNoteX === -Infinity) return; // first note of practice — leave view as load-useEffect set it
    if (noteX < prevNoteX) {
      // Loop: reset the view so the new note sits against the pinned header
      const resetX = practicePos.measure * measureWidth;
      if (isWidescreen) setTabletViewX(resetX);
      if (scoreAreaRef.current) {
        const cssPerSvg = isMobile ? (mobileScale * (mobileZoom || 1) * staffScale) : 1;
        scoreAreaRef.current.scrollLeft = Math.max(0, resetX * cssPerSvg);
      }
      return;
    }
    // Practice mode uses a 1/2 anchor (center) — so the user can see more
    // upcoming notes while they work out what to play next. Playback/learn
    // use 7/8. Both must keep the tracker on screen at every zoom level and
    // on every device: widescreen uses the viewBox width (tabletViewW /
    // staffScale); mobile uses mobileScale × mobileZoom × staffScale so the
    // scroll keeps up with the playhead and the tracker never drifts off.
    const ANCHOR = 1 / 2;
    if (isWidescreen) {
      const visibleSvgW = tabletViewW / staffScale;
      const target = Math.min(maxViewX, noteX - visibleSvgW * ANCHOR);
      setTabletViewX(prev => Math.max(prev, target));
    }
    if (scoreAreaRef.current) {
      const cssPerSvg = isMobile ? (mobileScale * (mobileZoom || 1) * staffScale) : 1;
      const clientW = scoreAreaRef.current.clientWidth;
      const endCap = Math.max(0, (endBarX + STAFF_LEFT) * cssPerSvg - clientW);
      const target = Math.min(endCap, Math.max(0, noteX * cssPerSvg - clientW * ANCHOR));
      scoreAreaRef.current.scrollLeft = Math.max(scoreAreaRef.current.scrollLeft, target);
    }
  }, [playMode, practicePos.measure, practicePos.note, measures, contentStart, measureWidth, isWidescreen, tabletViewW, isMobile, mobileScale, mobileZoom, staffScale, maxViewX, endBarX]);

  // Tablet touch swipe: horizontal = pan measures, vertical = scroll lyrics
  const tabletTouchStartX = useRef(null);
  const tabletTouchStartY = useRef(null);
  const tabletViewXOnTouchStart = useRef(0);
  const tabletLyricsScrollOnStart = useRef(0);
  const tabletSwipeAxis = useRef(null); // "h" or "v" — locked after first move
  // For grand staff, lyrics live in the gap between the two staves; otherwise below the staff
  const lyricsAreaTop = clef === "grand" ? STAFF_TOP + 4 * LINE_SPACING + 30 : STAFF_TOP + 4 * LINE_SPACING + 70;
  // Max scroll: for grand staff, allow scrolling enough to bring the last verse
  // into the 2-line window (verseCount - 2 hidden lines × 34px each).
  // For other clefs, scroll to bring last verse above the viewBox bottom.
  const lyricsMaxScroll = clef === "grand"
    ? Math.max(0, (maxVerseCount - 2) * 34)
    : Math.max(0, (STAFF_TOP + 4 * LINE_SPACING + 100) + Math.max(0, maxVerseCount - 1) * 34 + 30 - (tabletViewTop + tabletViewH));

  const tabletViewYOffsetOnStart = useRef(0);
  const handleTabletTouchStart = useCallback((e) => {
    if (!isTablet) return;
    // Skip single-finger pan while a 2-finger pinch is in progress (handled
    // by handleMobilePinchStart/Move).
    if (e.touches.length >= 2) return;
    tabletTouchStartX.current = e.touches[0].clientX;
    tabletTouchStartY.current = e.touches[0].clientY;
    tabletViewXOnTouchStart.current = tabletViewX;
    tabletLyricsScrollOnStart.current = lyricsScrollY;
    tabletViewYOffsetOnStart.current = tabletViewYOffset;
    tabletSwipeAxis.current = null;
  }, [isTablet, tabletViewX, lyricsScrollY, tabletViewYOffset]);
  const handleTabletTouchMove = useCallback((e) => {
    if (!isTablet || tabletTouchStartX.current === null || draggingNote) return;
    if (e.touches.length >= 2) return; // pinch-zoom owns multi-touch
    const dx = tabletTouchStartX.current - e.touches[0].clientX;
    const dy = tabletTouchStartY.current - e.touches[0].clientY;
    if (!tabletSwipeAxis.current) {
      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
        tabletSwipeAxis.current = Math.abs(dx) > Math.abs(dy) ? "h" : "v";
      } else return;
    }
    const svgPixelsPerScreenPixel = tabletViewW / viewportWidth;
    const zoom = mobileZoom || 1;
    if (tabletSwipeAxis.current === "h") {
      const newX = Math.max(0, Math.min(maxViewX, tabletViewXOnTouchStart.current + dx * svgPixelsPerScreenPixel / zoom));
      setTabletViewX(newX);
    } else if (zoom > 1) {
      // Zoomed in: vertical drag pans the viewBox up/down so you can see the
      // top/bottom of the enlarged staff + lyrics.
      const maxYOffset = (tabletViewH / staffScale) * (1 - 1 / zoom);
      const newY = Math.max(0, Math.min(maxYOffset, tabletViewYOffsetOnStart.current + dy * svgPixelsPerScreenPixel / zoom));
      setTabletViewYOffset(newY);
    } else {
      // Not zoomed: vertical drag scrolls the lyrics (multi-verse songs).
      const newScroll = tabletLyricsScrollOnStart.current + dy * svgPixelsPerScreenPixel;
      setLyricsScrollY(Math.max(0, Math.min(lyricsMaxScroll, newScroll)));
    }
  }, [isTablet, tabletViewW, viewportWidth, draggingNote, lyricsMaxScroll, mobileZoom, tabletViewH, staffScale]);
  const handleTabletTouchEnd = useCallback(() => {
    tabletTouchStartX.current = null;
    tabletTouchStartY.current = null;
    tabletSwipeAxis.current = null;
  }, []);

  // Mobile pinch-zoom: two-finger pinch on staff or piano adjusts mobileZoom.
  const pinchStartDist = useRef(null);
  const pinchStartZoom = useRef(1);
  const handleMobilePinchStart = useCallback((e) => {
    if (!(isMobile || isTablet) || e.touches.length !== 2) return;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchStartDist.current = Math.hypot(dx, dy);
    pinchStartZoom.current = mobileZoom;
  }, [isMobile, isTablet, mobileZoom]);
  const handleMobilePinchMove = useCallback((e) => {
    if (!(isMobile || isTablet) || e.touches.length !== 2 || pinchStartDist.current == null) return;
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    const next = Math.max(1, Math.min(3, pinchStartZoom.current * (dist / pinchStartDist.current)));
    setMobileZoom(next);
    // Fully zoomed out → snap the vertical pan offset back to the top so the
    // staff lines up with tabletViewTop again.
    if (next <= 1 && isTablet) setTabletViewYOffset(0);
  }, [isMobile, isTablet]);
  const handleMobilePinchEnd = useCallback((e) => {
    if (e.touches.length < 2) pinchStartDist.current = null;
  }, []);

  // Scroll to selected note
  useEffect(() => {
    if (selectedNote && scoreAreaRef.current) {
      const cStart = STAFF_LEFT + CLEF_WIDTH + keySigWidth + TIME_SIG_WIDTH;
      const measureX = cStart + selectedNote.measure * measureWidth;
      const container = scoreAreaRef.current;
      const containerWidth = container.clientWidth;
      const targetScroll = measureX - containerWidth / 2 + measureWidth / 2;
      container.scrollTo({ left: Math.max(0, targetScroll), behavior: "smooth" });
    }
  }, [selectedNote, keySigWidth]);

  useEffect(() => {
    const durationKeys = { "4": "whole", "2": "half", "1": "quarter", "5": "eighth", "6": "sixteenth" };
    const handler = (e) => {
      if (childLock) return;
      if (window._bpmFocused) return;
      if (document.activeElement?.tagName === "INPUT") return;
      if (e.key === "Delete" || e.key === "Backspace") {
        deleteSelected();
        return;
      }
      // Number keys: set duration. Shift+number: set rest duration.
      const dur = durationKeys[e.key];
      if (dur) {
        if (e.shiftKey) {
          setIsRestMode(true);
        } else {
          setIsRestMode(false);
        }
        setSelectedDuration(dur);
        setIsDotted(false);
        setIsTriplet(false);
        return;
      }
      // 8 toggles dot
      if (e.key === "8") {
        setIsDotted(prev => { if (!prev) setIsTriplet(false); return !prev; });
        return;
      }
      // 'r' toggles rest mode
      if (e.key === "r" || e.key === "R") {
        setIsRestMode(prev => !prev);
      }
      if (e.key === "z" && (e.ctrlKey || e.metaKey) && !e.shiftKey) {
        e.preventDefault();
        undo();
      }
      if (e.key === "z" && (e.ctrlKey || e.metaKey) && e.shiftKey) {
        e.preventDefault();
        redo();
      }

    return () => window.removeEventListener("keydown", handler);
  }, [deleteSelected, childLock, undo, redo]);


  // ─── Mobile toolbar panels ─────────────────────────────────────────
  const renderMobilePanel = () => {
    switch (mobileTab) {
      case "note":
        return (
          <div style={{ display: "flex", alignItems: "center", gap: 8, justifyContent: "center", flexWrap: "wrap" }}>
            <button className={`m-btn ${tool === "note" ? "active" : ""}`} onClick={() => setTool("note")}>✏️ Note</button>
            <button className={`m-btn ${tool === "eraser" ? "active" : ""}`} onClick={() => setTool("eraser")}>🧹 Erase</button>
            <div className="m-sep" />
            {NOTE_DURATIONS.map(d => (
              <button key={`rest-${d.id}`}
                className={`m-btn-sq ${isRestMode && selectedDuration === d.id ? "active" : ""}`}
                onClick={() => {
                  if (isRestMode && selectedDuration === d.id) {
                    setIsRestMode(false);
                  } else {
                    setIsRestMode(true);
                    setSelectedDuration(d.id);
                  }
                }}
                title={`${d.name} Rest`}
              ><RestIcon type={REST_SYMBOLS[d.id]} size={20} /></button>
            ))}
            <div className="m-sep" />
            {(() => {
              const selNote = selectedNote ? measures[selectedNote.measure]?.notes[selectedNote.note] : null;
              const currentAcc = selNote && !selNote.isRest ? selNote.accidental : selectedAccidental;
              return ACCIDENTALS.map(a => (
                <button key={a.id} className={`m-btn-sq ${currentAcc === a.id ? "active" : ""}`}
                  onClick={() => {
                    if (selectedNote && !selNote?.isRest) {
                      setMeasures(prev => {
                        const next = [...prev];
                        const notes = [...next[selectedNote.measure].notes];
                        notes[selectedNote.note] = { ...notes[selectedNote.note], accidental: a.id };
                        next[selectedNote.measure] = { ...next[selectedNote.measure], notes };
                        return next;
                      });
                    }
                    setSelectedAccidental(a.id);
                  }}>{a.label}</button>

            })()}
          </div>
        );
      case "duration":
        return (
          <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "center" }}>
            {NOTE_DURATIONS.map(d => (
              <button key={d.id} className={`m-dur ${selectedDuration === d.id ? "active" : ""}`}
                onClick={() => { setSelectedDuration(d.id); setIsDotted(false); setIsTriplet(false); }}>
                <DurationIcon type={d.id} size={32} />

              </button>
            ))}
            <button className={`m-dur ${isDotted ? "active" : ""}`}
              onClick={() => { setIsDotted(!isDotted); if (!isDotted) setIsTriplet(false); }}>
              <span style={{ fontSize: 24, lineHeight: "24px", fontWeight: 700 }}>&#x2022;</span>
              <span style={{ fontSize: 10, opacity: 0.7, fontFamily: "'DM Sans', sans-serif" }}>Dot</span>
            </button>
            <button className={`m-dur ${isTriplet ? "active" : ""}`}
              onClick={() => { setIsTriplet(!isTriplet); if (!isTriplet) setIsDotted(false); }}>
              <svg width={32} height={36} viewBox="0 0 40 44" style={{ display: "block" }}>
                <text x={20} y={10} textAnchor="middle" fontSize={13} fill="currentColor" fontWeight="600" fontFamily="serif">3</text>
                <line x1={9} y1={13} x2={33} y2={13} stroke="currentColor" strokeWidth={3.5} />
                <line x1={9} y1={13} x2={9} y2={33} stroke="currentColor" strokeWidth={1.8} />
                <line x1={21} y1={13} x2={21} y2={33} stroke="currentColor" strokeWidth={1.8} />
                <line x1={33} y1={13} x2={33} y2={33} stroke="currentColor" strokeWidth={1.8} />
                <ellipse cx={6} cy={35} rx={5} ry={3.8} fill="currentColor" transform="rotate(-20,6,35)" />
                <ellipse cx={18} cy={35} rx={5} ry={3.8} fill="currentColor" transform="rotate(-20,18,35)" />
                <ellipse cx={30} cy={35} rx={5} ry={3.8} fill="currentColor" transform="rotate(-20,30,35)" />
              </svg>
              <span style={{ fontSize: 10, opacity: 0.7, fontFamily: "'DM Sans', sans-serif" }}>Trip</span>
            </button>
          </div>
        );
      case "options":
        return (
          <div style={{ display: "flex", alignItems: "center", gap: 8, justifyContent: "center", flexWrap: "wrap" }}>
            <button className="m-btn" onClick={addMeasure}>+ Measure</button>
            <button className="m-btn" onClick={removeMeasure}>− Measure</button>
            <button className="m-btn" onClick={clearAll} style={{ color: "var(--danger)" }}>Clear All</button>
            <div className="m-sep" />
            <button className={`m-btn ${timeSig.top === 4 ? "active" : ""}`}
              onClick={() => setTimeSig({ top: 4, bottom: 4 })}>4/4</button>
            <button className={`m-btn ${timeSig.top === 3 ? "active" : ""}`}
              onClick={() => setTimeSig({ top: 3, bottom: 4 })}>3/4</button>
            <button className={`m-btn ${timeSig.top === 2 ? "active" : ""}`}
              onClick={() => setTimeSig({ top: 2, bottom: 4 })}>2/4</button>
            <div className="m-sep" />
            <span style={{ fontSize: 12, color: "var(--text2)" }}>Key</span>
            <button onClick={() => shiftKey(-1)} disabled={!transposeRange.canShiftDown}
              title={transposeRange.canShiftDown ? "Transpose down a half step" : "Lowest note is already A1"}

                onKeyDown={e => { if (e.key === "Enter") { e.target.blur(); } e.stopPropagation(); }}
                placeholder="C"
                style={{ width: 42, height: 30, fontSize: 13, fontWeight: 600, textAlign: "center",
                  background: "var(--bg3)", border: "1px solid var(--border)", borderRadius: 4, color: "var(--text)", padding: 0, fontFamily: "inherit", outline: "none" }}
                title="Type a key signature (C, G, Bb, F#, etc.) and press Enter"
              />
              <button onClick={() => shiftKeySig(+1)} className="dur-btn"
                style={{ width: 20, height: 30, padding: 0, fontSize: 10 }}
                title="More sharps">▶</button>
            </div>
          </div>
          <div style={{ width: 1, height: 40, background: "var(--border)" }} />
          <div>
            <div className="section-label">Measures</div>
            <div style={{ display: "flex", gap: 4 }}>
              <button className="dur-btn" onClick={addMeasure}>
                <span style={{ fontSize: 18 }}>➕</span>
                <span style={{ fontSize: 10, opacity: 0.7, fontFamily: "'DM Sans', sans-serif" }}>Add</span>
              </button>
              <button className="dur-btn" onClick={removeMeasure}>
                <span style={{ fontSize: 18 }}>➖</span>
                <span style={{ fontSize: 10, opacity: 0.7, fontFamily: "'DM Sans', sans-serif" }}>Remove</span>
              </button>
              <button className="dur-btn" onClick={clearAll} style={{ color: "var(--danger)" }}>
                <span style={{ fontSize: 18 }}>🗑️</span>
                <span style={{ fontSize: 10, opacity: 0.7, fontFamily: "'DM Sans', sans-serif" }}>Clear</span>
              </button>
              <button className="dur-btn" onClick={() => {
                const mi = selectedNote ? selectedNote.measure : lastClickedMeasure;
                setMeasures(prev => { const next = [...prev]; next[mi] = { ...next[mi], repeatStart: !next[mi].repeatStart }; return next; });
              }}>
                <span style={{ fontSize: 14 }}>𝄆</span>
                <span style={{ fontSize: 10, opacity: 0.7, fontFamily: "'DM Sans', sans-serif" }}>Start</span>
              </button>
              <button className="dur-btn" onClick={() => {
                const mi = selectedNote ? selectedNote.measure : lastClickedMeasure;
                setMeasures(prev => { const next = [...prev]; next[mi] = { ...next[mi], repeat: !next[mi].repeat }; return next; });
              }}>
                <span style={{ fontSize: 14 }}>𝄇</span>
                <span style={{ fontSize: 10, opacity: 0.7, fontFamily: "'DM Sans', sans-serif" }}>End</span>
              </button>
              <button className={`dur-btn ${measures[selectedNote ? selectedNote.measure : lastClickedMeasure] && measures[selectedNote ? selectedNote.measure : lastClickedMeasure].volta1Start ? "active" : ""}`} onClick={() => {
                const mi = selectedNote ? selectedNote.measure : lastClickedMeasure;
                setMeasures(prev => { const next = [...prev]; next[mi] = { ...next[mi], volta1Start: !next[mi].volta1Start }; return next; });
              }}>
                <span style={{ fontSize: 10, fontWeight: 700 }}>1.⌐</span>
                <span style={{ fontSize: 9, opacity: 0.7, fontFamily: "'DM Sans', sans-serif" }}>1st Open</span>
              </button>
              <button className={`dur-btn ${measures[selectedNote ? selectedNote.measure : lastClickedMeasure] && measures[selectedNote ? selectedNote.measure : lastClickedMeasure].volta1End ? "active" : ""}`} onClick={() => {
                const mi = selectedNote ? selectedNote.measure : lastClickedMeasure;
                setMeasures(prev => { const next = [...prev]; next[mi] = { ...next[mi], volta1End: !next[mi].volta1End }; return next; });
              }}>
                <span style={{ fontSize: 10, fontWeight: 700 }}>¬1.</span>
                <span style={{ fontSize: 9, opacity: 0.7, fontFamily: "'DM Sans', sans-serif" }}>1st Close</span>
              </button>
              <button className={`dur-btn ${measures[selectedNote ? selectedNote.measure : lastClickedMeasure] && measures[selectedNote ? selectedNote.measure : lastClickedMeasure].volta2Start ? "active" : ""}`} onClick={() => {
                const mi = selectedNote ? selectedNote.measure : lastClickedMeasure;
                setMeasures(prev => { const next = [...prev]; next[mi] = { ...next[mi], volta2Start: !next[mi].volta2Start }; return next; });
              }}>
                <span style={{ fontSize: 10, fontWeight: 700 }}>2.⌐</span>
                <span style={{ fontSize: 9, opacity: 0.7, fontFamily: "'DM Sans', sans-serif" }}>2nd Open</span>
              </button>
              <button className={`dur-btn ${measures[selectedNote ? selectedNote.measure : lastClickedMeasure] && measures[selectedNote ? selectedNote.measure : lastClickedMeasure].volta2End ? "active" : ""}`} onClick={() => {
                const mi = selectedNote ? selectedNote.measure : lastClickedMeasure;
                setMeasures(prev => { const next = [...prev]; next[mi] = { ...next[mi], volta2End: !next[mi].volta2End }; return next; });
              }}>
                <span style={{ fontSize: 10, fontWeight: 700 }}>¬2.</span>
                <span style={{ fontSize: 9, opacity: 0.7, fontFamily: "'DM Sans', sans-serif" }}>2nd Close</span>
              </button>
              {(() => {
                const mi = selectedNote ? selectedNote.measure : lastClickedMeasure;
                const m = measures[mi] || {};
                return <>
                  {m.volta1Start && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                      <span style={{ fontSize: 9, opacity: 0.7 }}>1st Label</span>
                      <input type="text" value={m.volta1Label || ""} placeholder="1."
                        onChange={e => setMeasures(prev => { const next = [...prev]; next[mi] = { ...next[mi], volta1Label: e.target.value }; return next; })}
                        onKeyDown={e => e.stopPropagation()}
                        style={{ width: 60, padding: "2px 4px", fontSize: 11, background: "var(--bg)", border: "1px solid var(--border)", borderRadius: 4, color: "var(--text)", fontFamily: "inherit" }}
                      />
                    </div>
                  )}
                  {m.volta2Start && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                      <span style={{ fontSize: 9, opacity: 0.7 }}>2nd Label</span>
                      <input type="text" value={m.volta2Label || ""} placeholder="2."
                        onChange={e => setMeasures(prev => { const next = [...prev]; next[mi] = { ...next[mi], volta2Label: e.target.value }; return next; })}
                        onKeyDown={e => e.stopPropagation()}
                        style={{ width: 60, padding: "2px 4px", fontSize: 11, background: "var(--bg)", border: "1px solid var(--border)", borderRadius: 4, color: "var(--text)", fontFamily: "inherit" }}
                      />
                    </div>
                  )}
                </>;
              })()}
            </div>
          </div>
          <div style={{ flex: 1 }} />
          <div>
            <div className="section-label">BPM</div>
            <div style={{ display: "flex", alignItems: "center", gap: 2 }}>
              <button onClick={() => onBpmSliderChange(Math.max(20, bpm - 1))} className="dur-btn"
                style={{ width: 20, height: 30, padding: 0, fontSize: 10 }}>◀</button>
              <BpmInput bpm={bpm} setBpm={onBpmSliderChange} />
              <button onClick={() => onBpmSliderChange(Math.min(500, bpm + 1))} className="dur-btn"
                style={{ width: 20, height: 30, padding: 0, fontSize: 10 }}>▶</button>
            </div>
          </div>
        </div>
      )}

      {/* ═══ TITLE AND ARTIST ═══ */}
      <div style={{
        position: "relative",
        textAlign: "center",
        padding: (() => {
          const hasLeftCluster = childLock;
          if (isMobile) return hasLeftCluster ? "2px 120px 1px 120px" : "2px 0 1px";
          return hasLeftCluster ? "12px 160px 4px 160px" : "12px 0 4px";
        })(),
        background: "var(--bg)", flexShrink: 0,
        zIndex: 400,
        ...(isWidescreen ? { height: 65, overflow: "visible" } : {}),
      }}>
        {/* Left-side cluster: profile pill + (jams-mode) Load sheet music. Pinned
            to the left of the title row so the centered title isn't displaced. */}
        {childLock && (() => {
          const hasProfile = !!(playerName && allProfiles[playerName]);
          const mySongs = hasProfile ? (allProfiles[playerName].songs || []) : [];
          const count = mySongs.length;
          const pColor = hasProfile ? (allProfiles[playerName].color || "var(--accent)") : "var(--accent)";
          return (
            <div style={{
              position: "absolute",
              left: isMobile ? 8 : 20,
              top: "50%", transform: "translateY(-50%)",
              zIndex: 500,
              display: "flex", alignItems: "center", gap: 8,
            }}>
              {hasProfile && (
              <div style={{ position: "relative" }}>
              <button onClick={() => setShowProfileMenu(v => !v)} style={{
                height: isMobile ? 30 : 40,
                padding: isMobile ? "0 10px" : "0 14px",
                background: pColor, color: "#fff", border: "none", borderRadius: 20,
                fontSize: isMobile ? 13 : 15, fontWeight: 700,
                fontFamily: "inherit",
                display: "flex", alignItems: "center", gap: 6, cursor: "pointer",
              }} title={`${playerName}'s saved songs`}>
                <span>❤️</span>
                <span>{playerName}{count > 0 ? ` (${count})` : ''}</span>
                <span style={{ fontSize: "0.75em", opacity: 0.9 }}>▾</span>
              </button>
              {showProfileMenu && (
                <>
                  <div onClick={() => setShowProfileMenu(false)} style={{
                    position: "fixed", inset: 0, zIndex: 900, background: "transparent",
                  }} />
                  <div style={{
                    position: "absolute", top: "calc(100% + 6px)", left: 0,
                    minWidth: 220, maxWidth: 320, maxHeight: 360, overflowY: "auto",
                    background: "var(--bg)", border: `2px solid ${pColor}`, borderRadius: 12,
                    boxShadow: "0 10px 30px rgba(0,0,0,0.15)", zIndex: 1000,
                    padding: 6,
                  }}>
                    {mySongs.length === 0 ? (
                      <div style={{ padding: 14, fontSize: 13, color: "var(--text2)" }}>
                        No saved songs yet. Heart a song in the Library to save it here.
                      </div>
                    ) : mySongs.map(t => (
                      <button key={t} onClick={async () => {
                        try {
                          const res = await fetch('/api/published');
                          const songs = await res.json();
                          const match = songs.find(s => (s.title || '').trim() === t.trim());
                          if (match) loadSongData(match);
                        } catch (e) { /* ignore */ }
                        setShowProfileMenu(false);
                      }} style={{
                        display: "block", width: "100%", textAlign: "left",
                        padding: "10px 12px", background: "transparent", border: "none",
                        borderRadius: 8, cursor: "pointer",
                        fontSize: 15, color: "var(--text)",
                        fontFamily: "inherit",
                      }} onMouseEnter={e => e.currentTarget.style.background = "var(--bg2)"}
                         onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                        {t}
                      </button>
                    ))}
                  </div>
                </>
              )}
              </div>
              )}
              {!isJamsMode && (
                <button onClick={() => { window.location.href = '/myownvibes'; }} style={{
                  height: isMobile ? 30 : 40, width: isMobile ? 30 : 40, padding: 0,
                  background: "var(--bg3)", border: "1px solid var(--border)",
                  borderRadius: 6, color: "var(--text)",
                  fontSize: isMobile ? 18 : 22, lineHeight: 1, fontFamily: "inherit", cursor: "pointer",
                  display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
                }} title="Load your own sheet music (.xml / .mxl)">🎼</button>
              )}
              {isJamsMode && (
                <>
                  <input ref={xmlImportInputRef} type="file" accept=".xml,.mxl,.musicxml"
                    style={{ display: "none" }}
                    onChange={(e) => { const f = e.target.files?.[0]; if (f) importMusicXML(f); e.target.value = ""; }} />
                  <button onClick={() => xmlImportInputRef.current?.click()} style={{
                    height: isMobile ? 30 : 40, width: isMobile ? 30 : 40, padding: 0,
                    background: "var(--bg3)", border: "1px solid var(--border)",
                    borderRadius: 6, color: "var(--text)",
                    fontSize: isMobile ? 22 : 30, lineHeight: 1, fontFamily: "inherit", cursor: "pointer",
                    display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, overflow: "hidden",
                  }} title="Load sheet music (.xml / .mxl) — or drag one onto this page">📥</button>
                  {/* Same fontSize for both glyphs (the 𝄞 glyph is already
                      about 2× the height of 𝄢 at equal size). fontSize is
                      picked so the taller G clef fully fits the button. */}
                  {[
                    { id: "treble", label: <span style={{fontSize: isMobile ? 14 : 18, lineHeight: 1}}>𝄞</span>, title: "Treble (G) clef" },
                    { id: "bass",   label: <span style={{fontSize: isMobile ? 14 : 18, lineHeight: 1}}>𝄢</span>, title: "Bass (F) clef" },
                    { id: "grand",  label: (
                      // Two rows with explicit heights so the glyphs can't
                      // overlap: G clef row = 2× its fontSize (its natural
                      // visible height), F clef row = 1× its fontSize. Total
                      // stack fits inside the button and each glyph renders
                      // fully within its own row.
                      <span style={{display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center"}}>
                        <span style={{fontSize: isMobile ? 9 : 12, height: isMobile ? 18 : 24, lineHeight: 1, display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden"}}>𝄞</span>
                        <span style={{fontSize: isMobile ? 9 : 12, height: isMobile ? 9 : 12, lineHeight: 1, display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden"}}>𝄢</span>
                      </span>
                    ), title: "Grand staff" },
                  ].map(({ id, label, title }) => (
                    <button key={id} onClick={() => pickClef(id)} style={{
                      height: isMobile ? 30 : 40, width: isMobile ? 30 : 40, padding: 0,
                      background: clef === id ? "var(--accent)" : "var(--bg3)",
                      border: clef === id ? "1px solid var(--accent)" : "1px solid var(--border)",
                      borderRadius: 6, color: clef === id ? "#fff" : "var(--text)",
                      fontFamily: "'Noto Music', 'Noto Serif', serif", fontWeight: 400, cursor: "pointer",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      flexShrink: 0, overflow: "hidden",
                    }} title={title}>{label}</button>
                  ))}
                </>
              )}
            </div>
          );
        })()}
        <div style={{ pointerEvents: "auto", display: "inline-block" }}>
          {childLock ? (
            <div className="score-title" style={{ cursor: "default" }}>{title}</div>
          ) : (
            <input className="score-title" value={title} onChange={e => setTitle(e.target.value)} />
          )}
          {!childLock && <div><input className="score-composer" value={composer} onChange={e => setComposer(e.target.value)} placeholder="Artist" /></div>}
          {!childLock && isPublished && (
            <div style={{
              display: "inline-block", marginTop: 4, padding: "3px 10px",
              background: "var(--green, #16a34a)", color: "#fff",
              borderRadius: 12, fontSize: 11, fontWeight: 700,
              fontFamily: "'DM Sans', sans-serif", letterSpacing: 0.5,
            }}>PUBLISHED — Unpublish song first to save</div>
          )}
          {childLock && composer && composer.trim() !== "" && <div style={{ fontSize: isMobile ? 10 : 14, color: "var(--text2)", marginTop: 0, lineHeight: 1.1 }}>{composer}</div>}
        </div>
      </div>

      {/* ═══ SCORE AREA ═══ */}
      <div style={{ position: "relative", ...(isWidescreen ? { height: tabletScoreH, flexShrink: 0 } : { flex: 1, minHeight: 0, overflow: "hidden" }) }}>
      <div ref={scoreAreaRef}
        onTouchStart={(isMobile || isTablet) ? handleMobilePinchStart : undefined}
        onTouchMove={(isMobile || isTablet) ? handleMobilePinchMove : undefined}
        onTouchEnd={(isMobile || isTablet) ? handleMobilePinchEnd : undefined}
        onScroll={isMobile ? (e) => {
          // CSS-per-SVG-pixel on mobile = mobileScale × mobileZoom × staffScale
          // (matches the viewBox stretch). The pinned header's translate
          // depends on this being in SVG units; without staffScale the header
          // drifted relative to the scrolling notes.
          const cssPerSvg = (mobileScale || 1) * (mobileZoom || 1) * (staffScale || 1);
          setMobileScrollX(e.target.scrollLeft / (cssPerSvg || 1));
        } : undefined}
        style={{
        width: "100%", height: "100%",
        // Mobile needs overflow:auto unconditionally — the SVG content is
        // wider than the viewport (1.65× scale bump) and programmatic
        // scrollLeft assignments from the playback rAF must actually scroll
        // the notes. With overflow:hidden, onScroll would still fire for the
        // pinned header's translate but the notes wouldn't move → clef drifts
        // away from the staff.
        overflow: isMobile ? "auto" : "hidden",
        WebkitOverflowScrolling: "touch",
        padding: isMobile ? "2px 4px 2px" : "0",
        background: "var(--bg)",
        border: "none", outline: "none",
        touchAction: isMobile ? "pan-x pan-y" : undefined,
      }}>
        <svg ref={svgRef}
          width={isMobile ? totalWidth * mobileScale * mobileZoom : "100%"}
          height={isMobile ? mobileViewH * mobileScale * mobileZoom : tabletScoreH}
          viewBox={isMobile ? `0 ${STAFF_TOP - 70} ${totalWidth / staffScale} ${mobileViewH / staffScale}` : `${tabletViewX} ${tabletViewTop + tabletViewYOffset} ${tabletViewW / staffScale / (isTablet ? (mobileZoom || 1) : 1)} ${tabletViewH / staffScale / (isTablet ? (mobileZoom || 1) : 1)}`}
          preserveAspectRatio="none"
          style={{ display: "block", margin: "0 auto", touchAction: (isWidescreen && !draggingNote) ? "none" : (draggingNote ? "none" : "pan-x pan-y") }}
          onClick={handleStaffClick}
          onMouseMove={draggingNote ? handleDragMove : handleStaffHover}
          onWheel={isWidescreen ? (e) => {
            e.preventDefault();
            const svgPixelsPerScreenPixel = tabletViewW / viewportWidth;
            if (Math.abs(e.deltaX) > Math.abs(e.deltaY) || e.shiftKey) {
              // Horizontal: pan measures
              const dx = e.shiftKey ? e.deltaY : e.deltaX;
              setTabletViewX(prev => Math.max(0, Math.min(maxViewX, prev + dx * svgPixelsPerScreenPixel)));
            } else {
              // Vertical: scroll lyrics
              setLyricsScrollY(prev => Math.max(0, Math.min(lyricsMaxScroll, prev + e.deltaY * svgPixelsPerScreenPixel)));
            }
          } : undefined}
          onTouchStart={isTablet ? handleTabletTouchStart : undefined}
          onTouchMove={isTablet ? (draggingNote ? handleDragMove : handleTabletTouchMove) : (draggingNote ? handleDragMove : undefined)}
          onMouseUp={handleDragEnd}
          onTouchEnd={(e) => { handleDragEnd(e); handleTabletTouchEnd(); }}
          onMouseLeave={draggingNote ? handleDragEnd : handleStaffLeave}
        >
          {Array.from({ length: numRows }, (_, row) => {
            const rowY = row * ROW_HEIGHT;
            const rowMeasures = measures.slice(row * MEASURES_PER_ROW, (row + 1) * MEASURES_PER_ROW);
            const startIdx = row * MEASURES_PER_ROW;
            // Staff lines end at the first thick line (the one beside the thin line)
            const staffWidth = CLEF_WIDTH + keySigWidth + TIME_SIG_WIDTH + rowMeasures.length * measureWidth;

            // Pinned header width + vertical extent — used by the sticky-header group below.
            const headerW = CLEF_WIDTH + keySigWidth + TIME_SIG_WIDTH + 40;
            const headerX = STAFF_LEFT - 40; // include room for grand-staff brace
            const headerYTop = STAFF_TOP - 80;
            const headerH = clef === "grand"
              ? (BASS_STAFF_TOP + 4 * LINE_SPACING + 160 - (STAFF_TOP - 80))
              : (4 * LINE_SPACING + 160);
            return (
              <g key={row} transform={`translate(0, ${rowY})`}>
                {/* Static staff lines — extend across the whole system, under notes */}
                <StaffLines x={STAFF_LEFT} width={staffWidth} />
                {clef === "grand" && (
                  <StaffLines x={STAFF_LEFT} width={staffWidth} top={BASS_STAFF_TOP} />
                )}

                {rowMeasures.map((measure, ci) => {
                  const mi = startIdx + ci;
                  const mx = contentStart + ci * measureWidth;
                  const barBottom = clef === "grand" ? BASS_STAFF_TOP + 4 * LINE_SPACING : STAFF_TOP + 4 * LINE_SPACING;
                  return (
                    <g key={mi}>
                      <rect className="measure-fill" x={mx} y={STAFF_TOP - 60}
                        width={measureWidth} height={(clef === "grand" ? BASS_STAFF_TOP + 4 * LINE_SPACING - STAFF_TOP + 60 + 60 : LINE_SPACING * 4 + 120)} rx={4} />
                      {measure.repeatStart && (
                        <g>
                          {/* Extend staff lines to the thick barline */}
                          {Array.from({ length: 5 }, (_, li) => (
                            <line key={"rs"+li} x1={mx} y1={STAFF_TOP + li * LINE_SPACING} x2={mx + 7} y2={STAFF_TOP + li * LINE_SPACING} stroke="var(--line-color)" strokeWidth={2} />
                          ))}
                          {clef === "grand" && Array.from({ length: 5 }, (_, li) => (
                            <line key={"rsb"+li} x1={mx} y1={BASS_STAFF_TOP + li * LINE_SPACING} x2={mx + 7} y2={BASS_STAFF_TOP + li * LINE_SPACING} stroke="var(--line-color)" strokeWidth={2} />
                          ))}
                          <line x1={mx + 1} y1={STAFF_TOP} x2={mx + 1} y2={barBottom} stroke="var(--line-color)" strokeWidth={6} />
                          <line x1={mx + 10} y1={STAFF_TOP} x2={mx + 10} y2={barBottom} stroke="var(--line-color)" strokeWidth={2} />
                          <circle cx={mx + 18} cy={STAFF_TOP + 1.5 * LINE_SPACING} r={4} fill="var(--line-color)" />
                          <circle cx={mx + 18} cy={STAFF_TOP + 2.5 * LINE_SPACING} r={4} fill="var(--line-color)" />
                          {clef === "grand" && (
                            <>
                              <circle cx={mx + 18} cy={BASS_STAFF_TOP + 1.5 * LINE_SPACING} r={4} fill="var(--line-color)" />
                              <circle cx={mx + 18} cy={BASS_STAFF_TOP + 2.5 * LINE_SPACING} r={4} fill="var(--line-color)" />
                            </>
                          )}
                        </g>
                      )}
                      {measure.repeat ? (
                        <g>
                          <line x1={mx + measureWidth - 12} y1={STAFF_TOP} x2={mx + measureWidth - 12} y2={barBottom} stroke="var(--line-color)" strokeWidth={2} />
                          <line x1={mx + measureWidth - 4} y1={STAFF_TOP} x2={mx + measureWidth - 4} y2={barBottom} stroke="var(--line-color)" strokeWidth={6} />
                          <circle cx={mx + measureWidth - 20} cy={STAFF_TOP + 1.5 * LINE_SPACING} r={4} fill="var(--line-color)" />
                          <circle cx={mx + measureWidth - 20} cy={STAFF_TOP + 2.5 * LINE_SPACING} r={4} fill="var(--line-color)" />
                          {clef === "grand" && (
                            <>
                              <circle cx={mx + measureWidth - 20} cy={BASS_STAFF_TOP + 1.5 * LINE_SPACING} r={4} fill="var(--line-color)" />
                              <circle cx={mx + measureWidth - 20} cy={BASS_STAFF_TOP + 2.5 * LINE_SPACING} r={4} fill="var(--line-color)" />
                            </>
                          )}
                        </g>
                      ) : mi === measures.length - 1 ? (
                        <g>
                          {/* Final double barline: thin + thick */}
                          <line x1={mx + measureWidth - 16} y1={STAFF_TOP} x2={mx + measureWidth - 16} y2={barBottom} stroke="var(--line-color)" strokeWidth={2} />
                          <rect x={mx + measureWidth - 8} y={STAFF_TOP} width={8} height={barBottom - STAFF_TOP} fill="var(--line-color)" />
                        </g>
                      ) : (
                        <line x1={mx + measureWidth} y1={STAFF_TOP} x2={mx + measureWidth} y2={barBottom} stroke="var(--line-color)" strokeWidth={2} />
                      )}
                      <text x={mx + 8} y={STAFF_TOP - (isMobile ? 6 : 6)} fontSize={isMobile ? 16 : 20} fill="var(--text2)"
                        fontFamily="'DM Sans', sans-serif">{mi + 1}</text>
                      {/* Prima volta bracket */}
                      {(() => { const vTop = STAFF_TOP - (isMobile ? 60 : 70); const vBot = STAFF_TOP - (isMobile ? 30 : 40); return (
                      (measure.volta1Start || measure.volta1End) && (
                        <g>
                          {measure.volta1Start && <line x1={mx + 2} y1={vTop} x2={mx + 2} y2={vBot} stroke="#333" strokeWidth={2} />}

                                    beams.push(<line key={`beam2p-${gi}-${ndi}`} x1={fx1} y1={fy1} x2={fx2} y2={fy2} stroke={partColor} strokeWidth={5} />);
                                  });
                                }
                                // Extend ALL stems to reach the beam line
                                group.forEach((nd, ndi) => {
                                  const stemX = nd.noteX + NOTE_RX - 2;
                                  const t = x2 !== x1 ? (stemX - x1) / (x2 - x1) : 0;
                                  const beamAtX = beamY1 + t * (beamY2 - beamY1);
                                  const sh = STEM_HEIGHT + (nd.note.duration === "sixteenth" ? 10 : 0) - (nd.note.stemShorten || 0);
                                  const tipY = chordTopY(nd) - sh;
                                  if (tipY > beamAtX) {
                                    beams.push(<line key={`stemext-bg-${gi}-${ndi}`} x1={stemX} y1={tipY} x2={stemX} y2={beamAtX}

                                    beams.push(<line key={`stemext-${gi}-${ndi}`} x1={stemX} y1={tipY} x2={stemX} y2={beamAtX}

                                const x2 = last.noteX - NOTE_RX + 2;

                                if (isEvenStep && !anyChord) {
                                  // Slanted beam from first to last (no chords in the group)

                                  beamY2 = chordBotY(last) + stemH(last);
                                } else {
                                  // Flat beam at lowest stem tip (anchored below the lowest chord pitch)
                                  const maxY = Math.max(...group.map(nd => chordBotY(nd) + stemH(nd)));
                                  beamY1 = maxY;
                                  beamY2 = maxY;
                                }

                                beams.push(<line key={`beam-bg-${gi}`} x1={x1} y1={beamY1} x2={x2} y2={beamY2}

                                  const gradId = `beam-grad-${mi}-${gi}`;

                                    <linearGradient key={`grad-${gi}`} id={gradId} gradientUnits="userSpaceOnUse" x1={x1} y1={beamY1} x2={x2} y2={beamY2}>

                                    </linearGradient>
                                  );
                                  beams.push(<line key={`beam-${gi}`} x1={x1} y1={beamY1} x2={x2} y2={beamY2}

                                } else {
                                  beams.push(<line key={`beam-${gi}`} x1={x1} y1={beamY1} x2={x2} y2={beamY2}
                                    stroke={beamColor} strokeWidth={5} />);
                                }
                                if (isSixteenth) {
                                  beams.push(<line key={`beam2-bg-${gi}`} x1={x1} y1={beamY1 - 14} x2={x2} y2={beamY2 - 14}
                                    stroke="#000" strokeWidth={7} />);
                                  if (gradientStops) {
                                    const gradId2 = `beam2-grad-${mi}-${gi}`;
                                    beams.push(
                                      <linearGradient key={`grad2-${gi}`} id={gradId2} gradientUnits="userSpaceOnUse" x1={x1} y1={beamY1 - 14} x2={x2} y2={beamY2 - 14}>
                                        {gradientStops.map((s, si) => <stop key={si} offset={s.offset} stopColor={s.color} />)}

                                    beams.push(<line key={`beam2-${gi}`} x1={x1} y1={beamY1 - 14} x2={x2} y2={beamY2 - 14}

                                    beams.push(<line key={`beam2-${gi}`} x1={x1} y1={beamY1 - 14} x2={x2} y2={beamY2 - 14}

                                  }

                                  group.forEach((nd, ndi) => {
                                    if (nd.note.duration !== "sixteenth") return;
                                    const stemX = nd.noteX - NOTE_RX + 2;
                                    const dir = (ndi === 0) ? 1 : -1;
                                    const fragLen = 2 * NOTE_RX + 5; // spans the notehead width
                                    const fx1 = stemX;
                                    const fx2 = stemX + dir * fragLen;
                                    const off = -20; // above main beam for stems-down
                                    const fy1 = beamAt(fx1) + off;
                                    const fy2 = beamAt(fx2) + off;

                                    beams.push(<line key={`beam2p-bg-${gi}-${ndi}`} x1={fx1} y1={fy1} x2={fx2} y2={fy2} stroke="#000" strokeWidth={7} />);
                                    beams.push(<line key={`beam2p-${gi}-${ndi}`} x1={fx1} y1={fy1} x2={fx2} y2={fy2} stroke={partColor} strokeWidth={5} />);

                                }
                                // Extend ALL stems to reach the beam line
                                group.forEach((nd, ndi) => {
                                  const stemX = nd.noteX - NOTE_RX + 2;
                                  const t = x2 !== x1 ? (stemX - x1) / (x2 - x1) : 0;

                                let beamYatMid;

                            })()}

                {/* ═══ PINNED HEADER — clef + key sig + time sig, always visible while scrolling ═══ */}

                  {clef === "grand" && (

                      <text x={STAFF_LEFT + 6} y={STAFF_TOP + 3.5 * LINE_SPACING - 5}

      {(() => {

          startNote = Math.floor(minNoteVal / 7) * 7;

          : Math.min(MAX_WHITE_GAP, Math.floor(viewportWidth / (numWhiteKeys + 1.5)));
        const whiteW = isMobile ? Math.floor(whiteGap * 0.92) : Math.floor(whiteGap * 0.94);
        const blackW = isMobile ? Math.floor(whiteW * 0.6) : Math.floor(whiteW * 0.65);
        const pianoH = isMobile ? 90 : tabletPianoH;
        const blackH = isMobile ? 55 : Math.floor(pianoH * 0.5);
        // Android viewports are often shorter than iPhone landscape; lifting
        // the piano the same 55px pushes lyrics under it. On Android we keep
        // the piano at the natural bottom; iPhone keeps the lift for the home
        // indicator zone.
        const isAndroid = typeof navigator !== 'undefined' && /Android/i.test(navigator.userAgent);
        const pianoLift = isMobile ? 5 : 0;
        const whiteKeyH = isMobile ? pianoH + 6 + pianoLift : pianoH;
        // Scale letter labels to the actual key width so they always fit
        // inside their key, no matter how many keys are on screen. The
        // device-type ceiling keeps fonts from ballooning on wide viewports.
        const whiteFontSize = Math.max(8, Math.min(isMobile ? 14 * mobileZoom : (isTablet ? 16 : 20), Math.round(whiteW * 0.45)));
        const blackFontSize = Math.max(7, Math.min(isMobile ? 12 * mobileZoom : (isTablet ? 14 : 16), Math.round(blackW * 0.4)));
        const whiteKeys = allWhiteKeys.map((k, i) => ({ ...k, left: i * whiteGap }));
        const blackKeys = allBlackKeys.map((k) => ({ ...k, left: k.whiteIdx * whiteGap + whiteW - blackW / 2 }));
        const totalW = whiteGap * (numWhiteKeys - 1) + whiteW;
        return (
      <div
        style={{
        background: "var(--bg)", padding: isMobile ? "8px 0 6px" : "0",
        position: "relative", bottom: pianoLift,
        marginTop: isMobile ? 0 : tabletGapH,
        display: "flex", justifyContent: "center",
        flexShrink: 0,
        // Block browser-native pinch-zoom on the piano so a pinch gesture
        // on the keys doesn't zoom the entire page. Only the staff should
        // respond to pinch (handled by the pinch handlers on scoreAreaRef).
        touchAction: (isMobile || isTablet) ? "none" : undefined,
        overflowX: (isMobile && mobileZoom > 1) ? "auto" : "visible",
        touchAction: isMobile ? "pan-x" : undefined,
      }}>
        <div style={{ display: "flex", position: "relative", height: pianoH, width: totalW, flexShrink: 0 }}>
          {/* White keys */}
          {whiteKeys.map((k, i) => {
            // C/F have a black key overlapping only the right half of their
            // top; E/B only the left. Shift the letter by blackW/4 so it
            // sits in the middle of the visible (non-covered) top area.
            const letter = k.note.replace(/[0-9]/g, '');
            const octave = k.note.match(/\d/)?.[0];
            // Show octave number on every C (standard) AND on the very first
            // key (leftmost) so users see the keyboard's lower bound (A1).
            const showOctave = letter === "C" || i === 0;
            const letterShift = (letter === "C" || letter === "F") ? -blackW / 4
                              : (letter === "E" || letter === "B") ? blackW / 4
                              : 0;
            return (
            <div key={k.note} onClick={() => playPianoNote(k.note)}
              style={{
                position: "absolute", left: k.left, top: 0,
                width: whiteW, height: whiteKeyH, background: k.color,
                borderRadius: "0 0 6px 6px", cursor: "pointer",
                border: pressedPianoKeys[k.note] ? "3px solid #000" : "1px solid rgba(0,0,0,0.2)", boxSizing: "border-box",
                display: "flex", flexDirection: "column", justifyContent: "flex-start", alignItems: "center",
                paddingTop: 4, transition: "all 0.1s",
                filter: pressedPianoKeys[k.note] ? "brightness(1.8) saturate(1.5)" : "none",
                boxShadow: pressedPianoKeys[k.note] ? "0 0 20px rgba(255,255,255,0.8) inset, 0 0 15px rgba(255,255,255,0.6)" : "none",
              }}>
              <span style={{ fontSize: whiteFontSize, fontWeight: 700, color: "#000", transform: `translateX(${letterShift}px)` }}>{letter}{showOctave && <sub style={{ fontSize: "0.55em" }}>{octave}</sub>}</span>
            </div>
            );
          })}
          {/* Black keys */}
          {blackKeys.map(k => {
            const label = k.note.replace(/[0-9]/g, ''); // e.g., "C#"
            const isPressed = !!pressedPianoKeys[k.note];
            const bg = isPressed
              ? (blackKeyGradient[label] || pressedPianoKeys[k.note])
              : "#1a1a1a";
            return (
            <div key={k.note} onClick={() => playPianoNote(k.note)}
              style={{
                position: "absolute", left: k.left, top: 0,
                width: blackW, height: blackH, background: bg,
                borderRadius: "0 0 4px 4px", cursor: "pointer", zIndex: 2,
                border: isPressed ? "2px solid #fff" : "1px solid #000", boxSizing: "border-box",
                display: "flex", flexDirection: "column", justifyContent: "flex-start", alignItems: "center",
                paddingTop: 3, transition: "background 0.1s",
              }}>
              <span style={{ fontSize: blackFontSize, fontWeight: 700, color: "#fff", textAlign: "center", lineHeight: 1.2, textShadow: "-1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000" }}>{(() => {
                const n = k.note.replace(/[0-9]/g, '');
                const flats = {"C#":"Db","D#":"Eb","F#":"Gb","G#":"Ab","A#":"Bb"};
                return React.createElement('span', null, n + "/", React.createElement('br'), flats[n] || n);
              })()}</span>
            </div>
            );
          })}
        </div>
      </div>
        );
      })()}

                        </div>}

                      {!childLock && <div style={{ display: "flex", gap: 6, marginLeft: 12, flexShrink: 0 }}>

      {/* Password Prompt (verify-switch / verify-delete / set) */}
      {passwordModal && (() => {
        const target = allProfiles[passwordModal.profileName] || {};
        const isSet = passwordModal.type === 'set';
        const isSwitch = passwordModal.type === 'verify-switch';
        const title = isSet
          ? `Set password for ${passwordModal.profileName}`

        const canSubmit = isSet
          ? (pwInput.length >= 4 && pwInput === pwConfirm && pwHint.trim())
          : pwInput.length >= 1;
        const submit = async () => {
          if (!canSubmit) return;
          if (isSet) {
            const passwordHash = await hashPassword(pwInput);
            setAllProfiles(prev => {

              localStorage.setItem('profiles', JSON.stringify(next));

            closePwModal();
