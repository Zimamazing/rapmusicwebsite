<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="referrer" content="no-referrer">
  <title>Read &amp; Play Music</title>
  <link rel="icon" type="image/png" sizes="any" href="/icon.png">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="shortcut icon" href="/icon.png">
  <link rel="apple-touch-icon" href="/icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#9B6BFF">
  <!-- Preconnect to CDNs so the browser starts TCP + TLS handshakes while
       parsing HTML, saving ~100–300 ms on the first request to each host. -->
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch((e) => console.log('SW reg failed:', e));
      });
    }
  </script>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Read&amp;Play">
  <meta name="application-name" content="Read&amp;Play">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@300;400;700&family=Open+Sans:wght@300;400&family=DM+Sans:wght@300;400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Noto+Music&display=swap" rel="stylesheet" crossorigin="anonymous" referrerpolicy="no-referrer">
  <!-- Combining diacritics (U+0300-036F) fallback — Google Fonts' default Noto
       Sans subsets omit most combining marks (e.g. the synalepha tie U+035C
       used in Spanish hymn lyrics like Himno Nacional). A text=-subsetted
       Noto Sans guarantees those glyphs are served. Used as second-stack
       font for lyric text. -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans&text=%CC%80%CC%81%CC%82%CC%83%CC%84%CC%85%CC%86%CC%87%CC%88%CC%89%CC%8A%CC%8B%CC%8C%CC%8D%CC%8E%CC%8F%CC%90%CC%91%CC%92%CC%93%CC%94%CC%95%CC%96%CC%97%CC%98%CC%99%CC%9A%CC%9B%CC%9C%CC%9D%CC%9E%CC%9F%CC%A0%CC%A1%CC%A2%CC%A3%CC%A4%CC%A5%CC%A6%CC%A7%CC%A8%CC%A9%CC%AA%CC%AB%CC%AC%CC%AD%CC%AE%CC%AF%CC%B0%CC%B1%CC%B2%CC%B3%CC%B4%CC%B5%CC%B6%CC%B7%CC%B8%CC%B9%CC%BA%CC%BB%CC%BC%CC%BD%CC%BE%CC%BF%CD%80%CD%81%CD%82%CD%83%CD%84%CD%85%CD%86%CD%87%CD%88%CD%89%CD%8A%CD%8B%CD%8C%CD%8D%CD%8E%CD%8F%CD%90%CD%91%CD%92%CD%93%CD%94%CD%95%CD%96%CD%97%CD%98%CD%99%CD%9A%CD%9B%CD%9C%CD%9D%CD%9E%CD%9F%CD%A0%CD%A1%CD%A2%CD%A3%CD%A4%CD%A5%CD%A6%CD%A7%CD%A8%CD%A9%CD%AA%CD%AB%CD%AC%CD%AD%CD%AE%CD%AF&display=swap" rel="stylesheet" crossorigin="anonymous" referrerpolicy="no-referrer">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100dvh; overflow: hidden; }

    /* iPad portrait: show rotate message */
    #rotate-overlay {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: #000; z-index: 99999;
      flex-direction: column; justify-content: center; align-items: center;
      color: #fff; font-family: 'DM Sans', sans-serif; text-align: center;
    }
    #rotate-overlay .rotate-icon {
      font-size: 80px; margin-bottom: 24px;
    }
    #rotate-overlay .rotate-text {
      font-size: 28px; font-weight: 600;
    }
    /* Two messages: phones/tablets (touch) get "rotate your device",
       desktops/laptops (mouse/trackpad) get "make your window wider" —
       since you can't rotate a monitor. CSS picks the right one based on
       the primary pointer type. */
    #rotate-overlay .rotate-text-touch { display: block; }
    #rotate-overlay .rotate-text-mouse { display: none; }
    @media (pointer: fine) {
      #rotate-overlay .rotate-text-touch { display: none; }
      #rotate-overlay .rotate-text-mouse { display: block; }
    }
    @media (orientation: portrait) {
      #rotate-overlay { display: flex; }
      #root { display: none; }
    }
  </style>
</head>
<body>
  <div id="rotate-overlay">
    <div class="rotate-icon">&#x1F4F1;&#x21BB;</div>
    <div class="rotate-text rotate-text-touch">Please rotate your device to landscape</div>
    <div class="rotate-text rotate-text-mouse">Please widen your window — R&amp;P Music needs more room to show the keys and staff</div>
  </div>
  <div id="root"></div>
  <!-- All external libs use `defer` so HTML can render immediately. Scripts
       download in parallel and execute in document order after HTML parses.
       Babel-standalone scans for <script type="text/babel"> tags on load, so
       it still compiles + runs the inline app code correctly — just after
       first paint instead of blocking it. Huge LCP win on slow connections. -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous" defer></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js" crossorigin="anonymous" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" crossorigin="anonymous" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js" crossorigin="anonymous" defer></script>
  <script>
    // Server-side storage API
    window.noteforgeAPI = {
      async listSongs() {
        try {
          const res = await fetch('/api/songs');
          return await res.json();
        } catch (e) { console.error('List failed:', e); return []; }
      },
      async saveSong(song, oldTitle, opts) {
        try {
          const res = await fetch('/api/songs', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ song, oldTitle, loadedFrom: opts && opts.loadedFrom, allowOverwrite: !!(opts && opts.allowOverwrite) }),
          });
          if (res.status === 409) {
            const data = await res.json().catch(() => ({}));
            console.warn('Save blocked — would overwrite different song:', data.existingTitle);
            return { blocked: true, existingTitle: data.existingTitle };
          }
          return res.ok;
        } catch (e) { console.error('Save failed:', e); return false; }
      },
      async deleteSong(filename) {
        try {
          const res = await fetch('/api/songs/' + encodeURIComponent(filename), { method: 'DELETE', credentials: 'include' });
          return res.ok;
        } catch (e) { return false; }
      },
      async getState() {
        try {
          const res = await fetch('/api/state');
          return await res.json();
        } catch (e) { return {}; }
      },
      async saveState(state) {
        try {
          await fetch('/api/state', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(state),
          });
        } catch (e) { /* ignore */ }
      },
      async getDirectory() {
        try {
          const res = await fetch('/api/directory');
          const data = await res.json();
          return data.directory;
        } catch (e) { return null; }
      },
      async setDirectory(dir) {
        try {
          const res = await fetch('/api/directory', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ directory: dir }),
          });
          const data = await res.json();
          return data.ok ? data.directory : null;
        } catch (e) { return null; }
      },
      async browse(dirPath) {
        try {
          const res = await fetch('/api/browse?path=' + encodeURIComponent(dirPath || ''));
          return await res.json();
        } catch (e) { return null; }
      },
    };
  </script>
  <script src="app.js" defer></script>
</body>
</html>
