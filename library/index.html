<html lang="en">

<title>Library — R&P Music</title>
<meta name="description" content="All the songs in R&P Music — tap to play.">
<link rel="icon" href="/landing/icon.png">
<link rel="apple-touch-icon" href="/landing/icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="/landing/icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#9B6BFF">
<meta name="apple-mobile-web-app-title" content="R&P Music">
<meta name="apple-mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Chicle&family=Comic+Neue:wght@400;700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" crossorigin="anonymous" referrerpolicy="no-referrer">

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch((e) => console.log('SW reg failed:', e));

  }

<style>
  :root {
    --c: #dc2626; --d: #f97316; --e: #fde047; --f: #22c55e;
    --g: #3b82f6; --a: #a855f7; --b: #ec4899;
    --bg: #fffdf9; --bg2: #faf8f3; --bg3: #f0ece3;
    --text: #1a1a1a; --text2: #666; --border: #e5e5e5;
    --accent: #3b82f6; --danger: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  [hidden] { display: none !important; }
  html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.5; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  button { font-family: inherit; cursor: pointer; }
  .container { max-width: 960px; margin: 0 auto; padding: 0 24px; }

  .rainbow { display: flex; height: 6px; }
  .rainbow span { flex: 1; }
  .rainbow span:nth-child(1) { background: var(--c); }
  .rainbow span:nth-child(2) { background: var(--d); }
  .rainbow span:nth-child(3) { background: var(--e); }
  .rainbow span:nth-child(4) { background: var(--f); }
  .rainbow span:nth-child(5) { background: var(--g); }
  .rainbow span:nth-child(6) { background: var(--a); }
  .rainbow span:nth-child(7) { background: var(--b); }

  header { padding: 24px 0; border-bottom: 1px solid var(--border); }
  .nav { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .logo { display: flex; align-items: center; gap: 14px; font-weight: 700; font-size: 32px; }
  .logo img { width: 48px; height: 48px; border-radius: 10px; }
  .brand-logo { font-family: 'Chicle', cursive; letter-spacing: 0.05em; font-weight: 400; }
  .brand-logo .r { color: var(--c); }
  .brand-logo .p { color: var(--g); }
  .brand-logo .amp { display: inline-block; color: var(--e); margin: 0 -0.04em; text-shadow: -1px -1px 0 #a87b00, 1px -1px 0 #a87b00, -1px 1px 0 #a87b00, 1px 1px 0 #a87b00, -1px 0 0 #a87b00, 1px 0 0 #a87b00, 0 -1px 0 #a87b00, 0 1px 0 #a87b00; }
  .nav-links { display: flex; align-items: center; gap: 20px; }
  .nav-links a { color: var(--text2); font-size: 15px; }

  main { padding: 40px 0 80px; min-height: 60vh; }
  h1 { font-size: clamp(32px, 5vw, 44px); font-weight: 800; letter-spacing: -0.01em; text-align: center; margin-bottom: 8px; font-family: inherit; }
  .subtitle { text-align: center; color: var(--text2); margin-bottom: 32px; }

  /* Profile tabs */
  .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; align-items: center; justify-content: center; }
  .accounts-bar { margin: 12px 0 0; justify-content: flex-start; gap: 6px; }
  .accounts-bar .tab { padding: 6px 12px; font-size: 13px; }
  .tab {
    padding: 8px 14px; border-radius: 20px;
    border: 2px solid var(--border); background: var(--bg2);
    color: var(--text2); font-size: 14px; font-weight: 600;
    font-family: inherit;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .tab:hover { transform: translateY(-1px); }
  .tab.active { color: #fff; }
  .tab.all { padding: 8px 16px; }
  .tab.add { background: var(--bg3); color: var(--text2); }
  .tab.delete { background: var(--bg3); color: var(--danger); border-color: var(--border); }

  .songs { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .song {
    position: relative;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px; transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    display: flex; align-items: center; gap: 14px;
  }
  .song:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,0,0,0.08); }
  .song .link {
    position: absolute; inset: 0; border-radius: 14px; z-index: 0;
  }
  .song .play {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0; z-index: 1; pointer-events: none;
  }
  .song .info { flex: 1; min-width: 0; z-index: 1; pointer-events: none; }
  .song .title { font-size: 17px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
  .song .meta { font-size: 13px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .song .heart {
    position: relative; z-index: 2;
    width: 38px; height: 38px; border-radius: 50%;
    background: transparent; border: none;
    font-size: 22px; line-height: 1; padding: 0;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: transform 0.1s;
  }
  .song .heart:hover { transform: scale(1.15); }

  /* Admin cards stack title + actions vertically so the title can use the
     full card width and not get squeezed by the button row. */
  .admin-visible .song { flex-direction: column; align-items: stretch; gap: 10px; }
  .admin-visible .song .info { width: 100%; }
  .admin-visible .song .title { white-space: normal; }
  .admin-visible .song .meta { white-space: normal; }
  /* Admin action cluster — Open / Publish / Delete per card. */
  .admin-actions { position: relative; z-index: 2; display: flex; gap: 6px; flex-wrap: wrap; }
  .action-btn {
    padding: 6px 10px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg3);
    color: var(--text); font-size: 12px; font-weight: 700;
    font-family: inherit; white-space: nowrap;
    transition: transform 0.08s;
  }
  .action-btn:hover { transform: translateY(-1px); }
  .action-btn.action-open { background: var(--accent); color: #fff; border-color: var(--accent); }
  .action-btn.action-publish { background: #16a34a; color: #fff; border-color: #16a34a; }
  .action-btn.action-publish.published { background: #f97316; color: #fff; border-color: #f97316; }
  .action-btn.action-delete { color: var(--danger); }

  .empty { text-align: center; padding: 80px 20px; color: var(--text2); }
  .empty .emoji { font-size: 56px; margin-bottom: 16px; }

  /* Add-profile modal */
  .backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 20px; z-index: 100;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .modal {
    background: var(--bg); border-radius: 16px; padding: 28px;
    max-width: 360px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    margin-top: 20px; margin-bottom: 20px;
  }
  .modal h2 { font-size: 22px; margin-bottom: 16px; font-family: inherit; }
  .modal label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; margin-top: 12px; }
  .modal input[type=text],
  .modal input[type=password] {
    width: 100%; padding: 10px 14px; font-size: 16px;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: inherit; outline: none;
  }
  .modal input:focus { border-color: var(--accent); }
  .color-swatches { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .swatch {
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid transparent; cursor: pointer; transition: transform 0.1s;
  }
  .swatch:hover { transform: scale(1.1); }
  .swatch.selected { border-color: var(--text); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; }
  .btn { padding: 10px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 14px; font-weight: 600; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Owner-only library enhancements */
  .search-bar { display: none; margin: 0 auto 20px; max-width: 420px; position: relative; }
  .search-bar input {
    width: 100%; padding: 10px 14px 10px 36px; font-size: 15px;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: inherit; outline: none;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar::before { content: "🔍"; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; }
  .admin-visible .search-bar { display: block; }
  .status-badge {
    display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase;
    padding: 2px 6px; border-radius: 4px; margin-left: 6px; letter-spacing: 0.03em; vertical-align: middle;
  }
  .status-badge.published { background: #16a34a22; color: #16a34a; }
  .status-badge.unpublished { background: #f9731622; color: #f97316; }
  .sort-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .sort-bar button {
    padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg2); color: var(--text2); font-size: 13px; font-weight: 600;
  }
  .sort-bar button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  /* Recent is admin-only; hide it in baby mode. */
  .sort-bar button[data-sort="recent"] { display: none; }
  .admin-visible .sort-bar button[data-sort="recent"] { display: inline-block; }

  /* A-Z filter strip — big, tappable, kid-friendly. */
  .alphabet { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 24px; }
  .alpha-btn {
    min-width: 38px; height: 38px; padding: 0 10px;
    border-radius: 8px; border: 2px solid var(--border); background: var(--bg2);
    color: var(--text); font-weight: 700; font-size: 16px; font-family: inherit;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s;
  }
  .alpha-btn:hover:not(:disabled) { transform: translateY(-1px); }
  .alpha-btn:disabled { color: var(--text2); opacity: 0.3; cursor: default; }
  .alpha-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  footer { padding: 40px 0; text-align: center; color: var(--text2); font-size: 14px; border-top: 1px solid var(--border); }
  footer .credit { display: inline-flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: center; }
  footer .heart-notes { display: inline-flex; vertical-align: middle; filter: drop-shadow(0 0 6px rgba(255, 7, 58, 0.55)) drop-shadow(0 0 14px rgba(255, 7, 58, 0.35)); }

  @media (max-width: 600px) {
    main { padding: 24px 0 60px; }
  }
</style>
</head>

<div class="rainbow"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>

<header>
  <div class="container nav">
    <div class="logo">
      <img src="/landing/icon.png" alt="R&P Music logo">
      <span class="brand-logo"><span class="r">R</span><span class="amp">&amp;</span><span class="p">P</span> Music</span>
    </div>
    <nav class="nav-links">
      <a href="/" data-i18n="navHome">Home</a>
      <a href="/app" data-i18n="navLaunchApp">Launch app</a>
    </nav>
  </div>
  <div class="container">
    <div class="tabs accounts-bar" id="accountsBar"></div>
  </div>
</header>

<main class="container">
  <h1>📚 <span data-i18n="pageTitle">Song Library</span></h1>
  <p class="subtitle" id="subtitle" data-i18n="subtitle">Pick a song to play.</p>

  <div class="search-bar">
    <input id="searchInput" type="text" placeholder="Search songs…" autocomplete="off">
  </div>
  <div class="sort-bar" id="sortBar">
    <button data-sort="recent">Recent</button>
  </div>

  <div class="tabs" id="tabs"></div>
  <div class="alphabet" id="alphabet"></div>

  <div id="songs" class="songs" hidden></div>
  <div id="empty" class="empty" hidden>
    <div class="emoji">🎵</div>
    <p id="emptyMsg">No songs yet.</p>
  </div>
  <div id="loading" class="empty" data-i18n="loading">Loading…</div>
</main>

<!-- Add-profile modal -->
<div id="addBackdrop" class="backdrop" hidden>
  <div class="modal" role="dialog" aria-label="Add person">
    <h2>❤️ <span data-i18n="modalTitle">Add an account</span></h2>
    <label for="nameInput"><span data-i18n="modalName">Name</span></label>
    <input id="nameInput" type="text" maxlength="24" autocomplete="off">
    <label for="passwordInput"><span data-i18n="modalPassword">Password</span> <span style="color:var(--text2);font-weight:400" data-i18n="modalPasswordHelp">(needed to delete this account)</span></label>
    <input id="passwordInput" type="password" maxlength="64" autocomplete="new-password">
    <label for="hintInput"><span data-i18n="modalHint">Password hint</span> <span style="color:var(--text2);font-weight:400" data-i18n="modalHintHelp">(a nudge to jog your memory — don't write the password itself)</span></label>
    <input id="hintInput" type="text" maxlength="64">
    <label data-i18n="modalColor">Favourite color</label>
    <div class="color-swatches" id="swatches"></div>
    <div id="addError" style="color:var(--danger);font-size:13px;margin-top:12px;display:none"></div>
    <div class="modal-actions">
      <button class="btn" id="addCancel" data-i18n="modalCancel">Cancel</button>
      <button class="btn btn-primary" id="addSave" data-i18n="modalCreate">Create</button>
    </div>
  </div>
</div>

  const RTL = new Set(["ar", "ur"]);

  if (!T[lang]) lang = (navigator.language || "en").slice(0, 2).toLowerCase();
  if (!T[lang]) lang = "en";
  const t = T[lang];
  const tr = (key, vars) => {
    let s = t[key] != null ? t[key] : (T.en[key] || key);
    if (vars) for (const k of Object.keys(vars)) s = s.replace('{' + k + '}', vars[k]);
    return s;
  };

  // Apply static translations
  document.querySelectorAll("[data-i18n]").forEach(el => {

  });

  document.getElementById('hintInput').placeholder = tr('modalHintPlaceholder');

  document.documentElement.dir = RTL.has(lang) ? "rtl" : "ltr";
  document.title = tr('pageTitle') + " — R&P Music";

  // --- Storage (mirrors the in-app keys so accounts created here show up there and vice versa) ---
  function readProfiles() {
    try { return JSON.parse(localStorage.getItem('profiles') || '{}'); } catch { return {}; }
  }
  function writeProfiles(p) {
    localStorage.setItem('profiles', JSON.stringify(p));
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'rpm-profiles-changed' }, window.location.origin);
      }
    } catch {}
  }
  function getActiveName() { return localStorage.getItem('playerName') || ''; }
  function setActiveName(n) {
    if (n) localStorage.setItem('playerName', n); else localStorage.removeItem('playerName');
    // Tell the parent app (when embedded) that the active profile has changed,
    // so its React state can re-sync from localStorage without a page refresh.
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(
          { type: 'rpm-profile-changed', playerName: n || '' },
          window.location.origin
        );
      }
    } catch {}
  }
  function profileColor(name, profiles) {
    return (profiles[name] && profiles[name].color) || '#3b82f6';
  }

  // Owner-only library features kick in when the server injects this flag
  // on the secret URL. In that mode we fetch /api/songs (all + status) and
  // expose search / sort / status badges.
  const isAdmin = window.__RPM_LIBRARY_ADMIN__ === true;
  if (isAdmin) document.body.classList.add('admin-visible');
  // In admin mode, derive the edit URL prefix from the current path
  // (e.g. /<EDIT_PATH>/library → /<EDIT_PATH>). Song clicks open edit mode.
  const editPrefix = isAdmin
    ? window.location.pathname.replace(/\/library\/?$/, '')
    : '/app';

  // When the library is rendered inside the main app's iframe overlay,
  // intercept song-selection clicks and postMessage the title to the parent
  // instead of navigating (parent preserves fullscreen / audio context).
  const IS_EMBED = (() => {
    try {
      const p = new URLSearchParams(window.location.search);
      return p.get('embed') === '1' || (window.parent && window.parent !== window);
    } catch { return false; }
  })();
  if (IS_EMBED) {
    document.addEventListener('click', (e) => {

  // SHA-256 hash, hex-encoded. Used to gate account deletion. localStorage is
  // not a secure store, so this keeps a sibling from trivially reading the
  // password — it does not protect against someone who opens devtools.
  async function sha256Hex(text) {
    const buf = new TextEncoder().encode(text);
    const digest = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  // --- Render: profile tabs ---
  // Layout:
  //   accountsBar (under the logo): profile chips + "+ Add account" + (optional) "- Delete account"
  //   tabs (under the sort bar): "📚 All songs"
  function renderTabs() {
    els.tabs.innerHTML = '';
    els.accountsBar.innerHTML = '';

    // Top row (under the logo): + Add, then - Delete, then profile chips.
    // A chip is highlighted when it's the active account (activeName), not
    // when it's the current filter tab — so the active user stays visibly
    // marked even after switching to "All songs".
    // "+ Add account" is for families using the public library to add their
    // kids' profiles — the admin/edit view doesn't need it.
    if (!isAdmin) {
      const addBtn = button(tr('tabAdd'), 'tab add');
      addBtn.onclick = openAddModal;
      els.accountsBar.appendChild(addBtn);
    }

    if (tab !== 'all' && profiles[tab]) {
      const delBtn = button(tr('tabDelete'), 'tab delete');
      delBtn.onclick = async () => {
        const target = tab;
        const stored = profiles[target] && profiles[target].passwordHash;
        if (stored) {
          const hint = profiles[target] && profiles[target].hint;
          const msg = hint
            ? tr('promptPassword', {name: target}) + '\n\n' + tr('hintLabel') + ': ' + hint
            : tr('promptPassword', {name: target});
          const pw = prompt(msg);
          if (pw == null) return; // cancelled
          const hash = await sha256Hex(pw);
          if (hash !== stored) { alert(tr('wrongPassword')); return; }
        } else {
          if (!confirm(tr('confirmDelete', {name: target}))) return;
        }
        delete profiles[target];
        writeProfiles(profiles);
        if (activeName === target) { activeName = ''; setActiveName(''); }
        tab = 'all';
        letterFilter = 'all';
        renderTabs();
        renderAlphabet();
        renderSongs();
      };
      els.accountsBar.appendChild(delBtn);
    }

    Object.keys(profiles).forEach(name => {
      const color = profileColor(name, profiles);
      const count = (profiles[name].songs || []).length;
      const isActive = activeName === name;
      const btn = button(`❤ ${name}${count ? ` (${count})` : ''}`, 'tab' + (isActive ? ' active' : ''));
      btn.style.borderColor = color;
      if (isActive) { btn.style.background = color; }
      else { btn.style.color = color; }
      btn.onclick = async () => {
        // Only prompt when switching AWAY from the currently-active account.
        if (name !== activeName) {
          const stored = profiles[name] && profiles[name].passwordHash;
          if (stored) {
            const hint = profiles[name] && profiles[name].hint;
            const msg = hint
              ? `Enter password for "${name}".\n\n${tr('hintLabel')}: ${hint}`
              : `Enter password for "${name}".`;
            const pw = prompt(msg);
            if (pw == null) return;
            const hash = await sha256Hex(pw);
            if (hash !== stored) { alert(tr('wrongPassword')); return; }
          }
        }
        tab = name;
        setActiveName(name);
        activeName = name;
        letterFilter = 'all';
        renderTabs();
        renderAlphabet();
        renderSongs();
      };
      els.accountsBar.appendChild(btn);
    });

    // Bottom row (above the song list): R&P Music category first, then All songs
    const rpBtn = document.createElement('button');
    rpBtn.className = 'tab rpmusic' + (tab === 'rpmusic' ? ' active' : '');
    if (tab === 'rpmusic') rpBtn.style.background = 'var(--accent)';
    const rpImg = document.createElement('img');
    rpImg.src = '/landing/icon.png';
    rpImg.alt = '';
    rpImg.style.cssText = 'width:20px;height:20px;border-radius:4px;vertical-align:middle;margin-right:6px;';
    rpBtn.appendChild(rpImg);
    const rpBrand = document.createElement('span');
    rpBrand.className = 'brand-logo';
    rpBrand.innerHTML = '<span class="r">R</span><span class="amp">&amp;</span><span class="p">P</span> Music';
    rpBtn.appendChild(rpBrand);
    rpBtn.onclick = () => { tab = 'rpmusic'; letterFilter = 'all'; renderTabs(); renderAlphabet(); renderSongs(); };
    els.tabs.appendChild(rpBtn);

    const allBtn = button('📚 ' + tr('tabAll'), 'tab all' + (tab === 'all' ? ' active' : ''));
    if (tab === 'all') allBtn.style.background = 'var(--accent)';
    allBtn.onclick = () => { tab = 'all'; letterFilter = 'all'; renderTabs(); renderAlphabet(); renderSongs(); };
    els.tabs.appendChild(allBtn);
  }

  function button(text, cls) {
    const b = document.createElement('button');
    b.className = cls;
    b.textContent = text;
    return b;
  }

  // --- Render: A-Z filter strip ---
  function renderAlphabet() {
    els.alphabet.innerHTML = '';

    // Which letters have songs *within the current tab*? Other letters gray out.
    let pool = allSongs.slice();
    if (tab === 'rpmusic') {
      pool = pool.filter(s => ((s.composer || '').toLowerCase()).includes('r&p music'));
    } else if (tab !== 'all' && profiles[tab]) {
      const saved = new Set(profiles[tab].songs || []);
      pool = pool.filter(s => saved.has((s.title || '').trim()));
    }
    const letters = new Set();
    let hasNonAlpha = false;
    pool.forEach(s => {
      const ch = firstLetter(s);
      if (ch >= 'A' && ch <= 'Z') letters.add(ch);
      else if (ch) hasNonAlpha = true;
    });

    const makeBtn = (label, value, enabled) => {
      const b = document.createElement('button');
      b.className = 'alpha-btn' + (letterFilter === value ? ' active' : '');
      b.textContent = label;
      if (!enabled) { b.disabled = true; return b; }
      b.onclick = () => { letterFilter = value; renderAlphabet(); renderSongs(); };
      return b;
    };

    els.alphabet.appendChild(makeBtn('All', 'all', true));
    for (let i = 0; i < 26; i++) {
      const L = String.fromCharCode(65 + i);
      els.alphabet.appendChild(makeBtn(L, L, letters.has(L)));
    }
    if (hasNonAlpha) els.alphabet.appendChild(makeBtn('#', '#', true));
  }

  // --- Render: songs ---
  function renderSongs() {
    els.songs.innerHTML = '';

    let visible = allSongs.slice();
    if (tab === 'rpmusic') {
      visible = visible.filter(s => ((s.composer || '').toLowerCase()).includes('r&p music'));
    } else if (tab !== 'all' && profiles[tab]) {
      const savedTitles = new Set(profiles[tab].songs || []);
      visible = visible.filter(s => savedTitles.has((s.title || '').trim()));
    }

    // A-Z letter filter
    if (letterFilter !== 'all') {
      visible = visible.filter(s => {
        const ch = firstLetter(s);
        return letterFilter === '#'
          ? !(ch >= 'A' && ch <= 'Z')
          : ch === letterFilter;
      });
    }

    // Search filter (admin mode)
    if (isAdmin && searchQuery) {
      const q = searchQuery.toLowerCase();
      visible = visible.filter(s => {
        const t = (s.title || s._filename || '').toLowerCase();
        const c = (s.composer || '').toLowerCase();
        return t.includes(q) || c.includes(q);
      });
    }

    if (visible.length === 0) {
      els.songs.hidden = true;
      els.empty.hidden = false;
      // innerHTML for the R&P Music branch so the branded Chicle markup
      // renders. Other branches are plain text and safe either way; the
      // searchQuery value is wrapped via escaping below.
      const escape = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
      els.emptyMsg.innerHTML = tab === 'all'
        ? (isAdmin && searchQuery ? `No songs match "${escape(searchQuery)}".` : escape(tr('emptyAll')))
        : tab === 'rpmusic'
          ? 'No <span class="brand-logo"><span class="r">R</span><span class="amp">&amp;</span><span class="p">P</span> Music</span> songs yet.'
          : escape(tr('emptyProfile', {name: tab}));
      return;
    }
    els.empty.hidden = true;
    els.songs.hidden = false;

    if (isAdmin && sortBy === 'title') {
      visible.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
    } else if (isAdmin && sortBy === 'recent') {
      visible.sort((a, b) => (b.savedAt || '').localeCompare(a.savedAt || ''));
    } else {
      visible.sort((a, b) => (a.difficulty || 99) - (b.difficulty || 99));
    }

    for (const song of visible) {
      const title = (song.title || (song._filename || '').replace(/\.json$/, '')).trim();
      const composer = (song.composer || '').trim();
      const measures = Array.isArray(song.measures) ? song.measures.length : 0;

      const card = document.createElement('div');
      card.className = 'song';

      const link = document.createElement('a');
      link.className = 'link';
      link.href = editPrefix + '?song=' + encodeURIComponent(title);
      link.setAttribute('aria-label', tr('ariaOpen', {title}));
      card.appendChild(link);

      const info = document.createElement('div');
      info.className = 'info';
      const titleEl = document.createElement('div');
      titleEl.className = 'title';
      titleEl.textContent = title || tr('untitled');
      if (isAdmin) {
        const badge = document.createElement('span');
        const isPub = song.published === true || song.published === 'true';
        badge.className = 'status-badge ' + (isPub ? 'published' : 'unpublished');
        badge.textContent = isPub ? 'Published' : 'Unpublished';
        titleEl.appendChild(badge);
      }
      const metaEl = document.createElement('div');
      metaEl.className = 'meta';
      const bits = [];
      if (composer) bits.push(composer);
      if (measures) bits.push(measures + ' ' + (measures === 1 ? tr('measureSingular') : tr('measurePlural')));
      metaEl.textContent = bits.join(' · ');
      info.appendChild(titleEl);
      info.appendChild(metaEl);
      card.appendChild(info);

      if (isAdmin) {
        // Admin card: explicit Open / Publish / Delete instead of the heart.
        const actions = document.createElement('div');
        actions.className = 'admin-actions';

        const openBtn = document.createElement('button');
        openBtn.className = 'action-btn action-open';
        openBtn.textContent = 'Open';
        openBtn.onclick = (e) => {
          e.preventDefault(); e.stopPropagation();
          if (IS_EMBED) {
            window.parent.postMessage({ type: 'rpm-open-song', title }, window.location.origin);
            return;
          }
          window.location.href = editPrefix + '?song=' + encodeURIComponent(title);
        };
        actions.appendChild(openBtn);

        const isPub = song.published === true || song.published === 'true';
        const pubBtn = document.createElement('button');
        pubBtn.className = 'action-btn action-publish' + (isPub ? ' published' : '');
        pubBtn.textContent = isPub ? 'Unpublish' : 'Publish';
        pubBtn.onclick = async (e) => {
          e.preventDefault(); e.stopPropagation();
          pubBtn.disabled = true;
          try {
            const resp = await fetch(isPub ? '/api/unpublish' : '/api/publish', {
              method: 'POST', credentials: 'include',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ title })
            });
            if (!resp.ok) throw new Error(await resp.text());
            song.published = !isPub;
            renderSongs();
          } catch (err) {
            alert('Publish failed: ' + (err.message || err));
            pubBtn.disabled = false;
          }
        };
        actions.appendChild(pubBtn);

        const delBtn = document.createElement('button');
        delBtn.className = 'action-btn action-delete';
        delBtn.textContent = 'Delete';
        delBtn.onclick = async (e) => {
          e.preventDefault(); e.stopPropagation();
          if (!confirm(`Delete "${title}"?\n(moves to trash — can be restored)`)) return;
          delBtn.disabled = true;
          try {
            const filename = song._filename || (title.replace(/[\/\\:*?"<>|]/g, '_') + '.json');
            const resp = await fetch('/api/songs/' + encodeURIComponent(filename), {
              method: 'DELETE', credentials: 'include'
            });
            if (!resp.ok) throw new Error(await resp.text());
            allSongs = allSongs.filter(s => s !== song);
            renderAlphabet();
            renderSongs();
          } catch (err) {
            alert('Delete failed: ' + (err.message || err));
            delBtn.disabled = false;
          }
        };
        actions.appendChild(delBtn);

        card.appendChild(actions);
      } else {
        // Baby card: keep the heart for profile favoriting.
        const heart = document.createElement('button');
        heart.className = 'heart';
        heart.setAttribute('aria-label', tr('ariaSave'));
        const savedForActive = activeName && profiles[activeName]
          ? (profiles[activeName].songs || []).includes(title)
          : false;
        heart.textContent = savedForActive ? '❤️' : '🤍';
        heart.onclick = (e) => {
          e.preventDefault(); e.stopPropagation();
          if (!activeName || !profiles[activeName]) {
            openAddModal();
            return;
          }
          const list = profiles[activeName].songs || [];
          const has = list.includes(title);
          profiles[activeName].songs = has ? list.filter(titl => titl !== title) : [...list, title];
          writeProfiles(profiles);
          renderTabs();
          renderAlphabet();
          renderSongs();
        };
        card.appendChild(heart);
      }

      els.songs.appendChild(card);
    }
  }

  // --- Add-profile modal ---
  let pickedColor = COLORS[0];
  function renderSwatches() {
    els.swatches.innerHTML = '';
    COLORS.forEach(c => {
      const s = document.createElement('div');
      s.className = 'swatch' + (c === pickedColor ? ' selected' : '');
      s.style.background = c;
      s.onclick = () => { pickedColor = c; renderSwatches(); };
      els.swatches.appendChild(s);
    });
  }
  function showAddError(msg) {
    els.addError.textContent = msg;
    els.addError.style.display = msg ? 'block' : 'none';
  }
  function openAddModal() {
    els.nameInput.value = '';
    els.passwordInput.value = '';
    els.hintInput.value = '';
    showAddError('');
    pickedColor = COLORS[Math.floor(Math.random() * COLORS.length)];
    renderSwatches();
    els.addBackdrop.hidden = false;
    // Focus without scrolling the input into view — on iOS Safari a plain
    // .focus() on a tall modal scrolls the "Sign up" heading + Name label
    // off-screen so the user only sees the name input with its placeholder.
    setTimeout(() => {
      els.nameInput.focus({ preventScroll: true });
      els.addBackdrop.scrollTop = 0;
    }, 50);
  }
  function closeAddModal() { els.addBackdrop.hidden = true; }
  els.addCancel.onclick = closeAddModal;
  els.addBackdrop.onclick = (e) => { if (e.target === els.addBackdrop) closeAddModal(); };
  els.addSave.onclick = async () => {
    const name = els.nameInput.value.trim();
    const password = els.passwordInput.value;
    if (!name) { showAddError(tr('errName')); els.nameInput.focus(); return; }
    if (profiles[name]) { showAddError(tr('errDuplicate')); return; }
    if (!password || password.length < 3) { showAddError(tr('errPassword')); els.passwordInput.focus(); return; }
    const passwordHash = await sha256Hex(password);
    const hint = els.hintInput.value.trim();
    profiles[name] = { songs: [], color: pickedColor, passwordHash, hint };
    writeProfiles(profiles);
    setActiveName(name);
    activeName = name;
    tab = name;
    letterFilter = 'all';
    closeAddModal();
    renderTabs();
    renderAlphabet();
    renderSongs();
  };
  function modalKey(e) {
    if (e.key === 'Enter') els.addSave.click();
    if (e.key === 'Escape') closeAddModal();
  }
  els.nameInput.addEventListener('keydown', modalKey);
  els.passwordInput.addEventListener('keydown', modalKey);

  // --- Search & sort wiring (admin mode only, but harmless to wire always) ---
  const searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value.trim();
      renderSongs();
    });
  }
  const sortBar = document.getElementById('sortBar');
  if (sortBar) {
    sortBar.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        sortBy = btn.getAttribute('data-sort');
        sortBar.querySelectorAll('button').forEach(b => b.classList.toggle('active', b === btn));
        renderSongs();
      });
    });
  }

  // --- Boot ---
  (async function () {
    try {
      // Admin uses /api/songs (all + published flag). Public uses /api/published.
      const endpoint = isAdmin ? '/api/songs' : '/api/published';
      const res = await fetch(endpoint, { credentials: 'include' });
      const songs = await res.json();
      allSongs = Array.isArray(songs) ? songs : [];
    } catch (e) {
      allSongs = [];
    }
    els.loading.hidden = true;
    renderTabs();
    renderAlphabet();
    renderSongs();
  })();
})();
</script>

</body>
</html>
